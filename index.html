<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <title>三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
  <meta name="description" content="三角洲情报台 DeltaIntel — 每日自动更新的战区情报站">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css?v=16">
  <link rel="stylesheet" href="css/admin-responsive.css?v=2">
  <!-- 性能优化：提前与 CDN / API 建立连接 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://api.github.com" crossorigin>
  <link rel="dns-prefetch" href="https://api.github.com">
</head>
<body>
  <div class="layout">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn menu-toggle" id="menuToggle" title="菜单">☰</button>
        <span class="logo">三角洲<span class="logo-accent">情报台</span></span>
        <span class="brand-en">DeltaIntel</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="langToggle" title="语言 / Language">🌐</button>
        <button class="icon-btn" id="themeToggle" title="切换明暗">🌓</button>
        <!-- 用户登录态（auth.js 接管） -->
        <button class="icon-btn user-btn" id="userBtn" title="登录 / 注册">👤</button>
        <a class="icon-btn" href="admin.html" title="管理后台">🛡</a>
      </div>
    </header>

    <!-- 左侧菜单 -->
    <aside class="sidebar" id="sidebar">
      <nav class="menu" id="menu"><!-- JS 注入 --></nav>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <!-- 内容区 -->
    <main class="content">
      <div id="LAY_preview" class="preview"><!-- 视图片段注入处 --></div>
    </main>

    <!-- 底栏 -->
    <footer class="footer">
      <p>三角洲情报台 · 数据每日自动更新 · <span id="updatedAt">加载中…</span></p>
    </footer>
  </div>

  <!-- 第三方库（图表）；GoJS 改为“制作树”视图内懒加载，避免每页多下载 3MB -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <!-- 多语言（必须在 app.js 之前加载，定义 window.t） -->
  <script defer src="js/i18n.js?v=1"></script>
  <!-- 站点脚本：app 先行，music / auth 监听其数据事件 -->
  <script defer src="js/app.js?v=16"></script>
  <script defer src="js/music.js?v=13"></script>
  <script defer src="js/auth.js?v=16"></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var b = document.getElementById("langToggle");
      if (b) b.addEventListener("click", function () {
        var cur = (window.getLang && window.getLang()) || "zh";
        window.setLang(cur === "zh" ? "en" : "zh");
      });
    });
  </script>

  <!-- Service Worker：应用外壳缓存优先，二次访问（尤其微信内）秒开 -->
  <script defer>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js?v=16").catch(function () {});
      });
    }
  </script>
</body>
</html>
