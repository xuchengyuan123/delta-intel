<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>资讯中心 · 三角洲情报台</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 14px 48px;
  }

  /* Header */
  header.site-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  header.site-head h1 {
    font-size: 22px;
    margin: 0;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header.site-head h1::before {
    content: "";
    width: 10px; height: 22px;
    background: linear-gradient(var(--green), var(--amber));
    border-radius: 2px;
    display: inline-block;
  }
  .back-link { font-size: 14px; color: var(--muted); }
  .back-link:hover { color: var(--blue); }

  /* Tabs */
  .tabbar {
    display: flex;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tabbar button {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-size: 16px;
    font-family: inherit;
    padding: 10px 16px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .tabbar button:hover { color: var(--text); }
  .tabbar button.active {
    color: var(--text);
    border-bottom-color: var(--green);
    font-weight: 600;
  }
  .tabbar button .count {
    display: inline-block;
    margin-left: 6px;
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 7px;
    vertical-align: middle;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fade .2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Cards */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    transition: border-color .15s, transform .15s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--green); transform: translateY(-1px); }
  .card.disabled { cursor: default; opacity: .7; }
  .card.disabled:hover { border-color: var(--border); transform: none; }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--text);
  }
  .card-title a { color: inherit; }
  .card-title a:hover { color: var(--blue); }
  .card-meta {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 6px;
  }
  .card-meta .src { color: var(--blue); }
  .card-summary {
    font-size: 14px;
    color: var(--muted);
    margin: 4px 0 0;
  }
  .n-stats { margin-top: 4px; font-size: 12.5px; }
  .n-stats span { color: var(--muted); }
  .n-stats span:last-child { color: var(--red); }

  /* 分类筛选条 */
  .catbar { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 14px; }
  .catbar button {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 5px 13px; font-size: 13px; cursor: pointer;
    transition: .15s;
  }
  .catbar button:hover { color: var(--text); border-color: var(--green); }
  .catbar button.on { background: var(--green); border-color: var(--green); color: #0b0e14; font-weight: 600; }

  /* 来源徽标 */
  .src-badge {
    display: inline-block; font-size: 12px; padding: 1px 9px; border-radius: 6px;
    color: var(--green); border: 1px solid rgba(63,185,80,.4); background: rgba(63,185,80,.08);
    font-weight: 600;
  }
  /* 展开正文 */
  .card-content {
    display: none; font-size: 13.5px; color: var(--muted); margin-top: 6px;
    line-height: 1.7; border-top: 1px dashed var(--border); padding-top: 8px; white-space: pre-wrap;
  }
  .card.expanded .card-content { display: block; }
  .card-toggle { font-size: 12px; color: var(--blue); margin-top: 6px; cursor: pointer; user-select: none; }
  .card-link { font-size: 12.5px; color: var(--blue); margin-top: 6px; display: inline-block; }


  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 2px 9px;
    border-radius: 12px;
    white-space: nowrap;
    border: 1px solid var(--border);
  }
  .badge-live { color: var(--red); border-color: rgba(248,81,73,.4); background: rgba(248,81,73,.08); }
  .badge-live .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 0 0 rgba(248,81,73,.7);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(248,81,73,.6); }
    70% { box-shadow: 0 0 0 7px rgba(248,81,73,0); }
    100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
  }
  .badge-offline { color: var(--muted); }
  .badge-platform {
    color: var(--amber);
    border-color: rgba(210,153,34,.4);
    background: rgba(210,153,34,.08);
  }

  /* Live / Video layout */
  .row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .thumb {
    flex: 0 0 150px;
    width: 150px;
    height: 90px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .ph {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: rgba(255,255,255,.85);
    background: linear-gradient(135deg, #1f6f3f, #0d4a8a);
    letter-spacing: 1px;
  }
  .thumb .dur {
    position: absolute;
    right: 5px; bottom: 5px;
    background: rgba(0,0,0,.75);
    color: #fff;
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .thumb .play {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 38px; height: 38px;
    background: rgba(0,0,0,.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .thumb .play::after {
    content: "";
    border-style: solid;
    border-width: 8px 0 8px 13px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }
  .row .body { flex: 1 1 auto; min-width: 0; }

  /* Embedded player */
  .embed-wrap {
    margin-top: 10px;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    padding-top: 56.25%;
  }
  .embed-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  .viewers { font-size: 13px; color: var(--muted); }
  .viewers strong { color: var(--green); }

  .empty { color: var(--muted); text-align: center; padding: 30px 0; }

  footer.note {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* Mobile */
  @media (max-width: 560px) {
    header.site-head h1 { font-size: 19px; }
    .row { flex-direction: column; }
    .thumb { width: 100%; flex-basis: auto; height: 170px; }
    .card-title { font-size: 15px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="site-head">
      <h1>资讯中心</h1>
      <a class="back-link" href="index.html">← 返回首页</a>
    </header>

    <nav class="tabbar" id="tabbar">
      <button data-tab="news" class="active">资讯 <span class="count" id="cnt-news">0</span></button>
      <button data-tab="live">直播 <span class="count" id="cnt-live">0</span></button>
      <button data-tab="videos">视频 <span class="count" id="cnt-videos">0</span></button>
    </nav>

    <section class="tab-panel active" id="panel-news">
      <div class="catbar" id="newsCats"></div>
      <div id="newsList"></div>
    </section>
    <section class="tab-panel" id="panel-live"></section>
    <section class="tab-panel" id="panel-videos"></section>

    <footer class="note">三角洲情报台 · 资讯中心 V34 · 数据优先读取 data.json，离线时使用内置示例数据</footer>
  </div>

<script>
(function () {
  "use strict";

  var ALL_NEWS = [];
  var NEWS_CAT = "";

  /* ---------- 内置示例数据（data.json 缺失/失败时回退；
     所有 url 留空表示“暂无官方链接”，请替换为真实地址） ---------- */
  var SAMPLE_NEWS = [
    { title: "《三角洲行动》S10 赛季「全面交战」正式开启", source: "官方公告", date: "2026-07-14", cat: "版本", summary: "新赛季新增多张地图与干员，排位赛同步重置，登录即领赛季奖励与限定头像框。", content: "S10 赛季「全面交战」已全面上线：排位赛段位重置，新增干员与地图轮换，完成赛季任务可领取哈夫币、武器皮肤与通行证奖励。建议先到训练场适应新版本手感。", url: "", thumb: "", views: 12840, likes: 932 },
    { title: "干员平衡性调整预告", source: "官方", date: "2026-07-13", cat: "版本", summary: "下版本将对部分突击干员后坐力与技能冷却进行微调，详情见公告。", content: "官方预告将对突击位干员的后坐力曲线与技能冷却做平衡性微调，同时优化部分地图的物资分布。正式数值以版本更新公告为准。", url: "", thumb: "", views: 8650, likes: 514 },
    { title: "夏日嘉年华限时活动上线", source: "三角洲情报台", date: "2026-07-12", cat: "活动", summary: "完成每日任务可兑换限定皮肤与物资箱，活动持续至月底。", content: "夏日嘉年华限时开启，每日任务累计可兑换限定皮肤、物资箱与哈夫币礼包，活动持续至本月底，错过需等复刻。", url: "", thumb: "", views: 5210, likes: 388 },
    { title: "S10 最强改枪方案合集（攻略）", source: "枪械研究室", date: "2026-07-11", cat: "攻略", summary: "覆盖 M4A1 / AKM / M7 等主流枪械从低配到满改的方案与改枪码。", content: "本攻略汇总 S10 主流枪械的低成本到满改配置，并附带可一键导入的改枪码，建议先在训练场试射确认手感再带入实战。", url: "", thumb: "", views: 15200, likes: 1200 },
    { title: "巴克什跑刀收益路线详解", source: "老六课堂", date: "2026-07-10", cat: "攻略", summary: "低战备进图、高价值撤离点位与避坑指南，适合平民跑刀玩家。", content: "巴克什作为高价值图，跑刀需精准卡战备值并熟悉撤离点。本文梳理了低成本进图路线、高价值物资点位与常见埋伏点，帮助稳定收益。", url: "", thumb: "", views: 9800, likes: 760 },
    { title: "三角洲杯全民赛事开赛", source: "赛事官方", date: "2026-07-09", cat: "赛事", summary: "全民赛拉开帷幕，报名即送限定头像框，冠军可获得专属称号。", content: "「三角洲杯」全民赛事正式开赛，面向所有段位玩家，单人/组队均可报名，海选采用积分制，决赛为线下表演赛。", url: "", thumb: "", views: 7300, likes: 540 }
  ];

  var SAMPLE_LIVE = [
    {
      platform: "B站",
      streamer: "三角洲情报台（示例）",
      title: "S10 上分实况（请替换为官方直播间/主播房间号）",
      viewers: 0,
      live: false,
      url: ""
    },
    {
      platform: "抖音",
      streamer: "战术大师（示例）",
      title: "凌晨上分不掉分（请替换为官方直播间/主播房间号）",
      viewers: 0,
      live: false,
      url: ""
    },
    {
      platform: "YouTube",
      streamer: "DeltaPros（示例）",
      title: "Ranked Grind（请替换为官方直播间/主播房间号）",
      viewers: 0,
      live: false,
      url: ""
    }
  ];

  var SAMPLE_VIDEOS = [
    {
      platform: "B站",
      title: "S10 最强改枪方案合集（示例）",
      author: "枪械研究室",
      duration: "12:30",
      thumb: "",
      url: "",
      embed: ""
    },
    {
      platform: "B站",
      title: "新手避坑指南：这些物资别乱卖（示例）",
      author: "老六课堂",
      duration: "08:15",
      thumb: "",
      url: "",
      embed: ""
    },
    {
      platform: "YouTube",
      title: "Top 10 Loadouts S10（示例）",
      author: "DeltaPros",
      duration: "15:02",
      thumb: "",
      url: "",
      embed: ""
    }
  ];

  /* ---------- 工具函数 ---------- */
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  function fmtViewers(n) {
    if (!n || n <= 0) return "—";
    if (n >= 10000) return (n / 10000).toFixed(1) + " 万";
    return String(n);
  }
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function isBili(url) {
    return /bilibili\.com\/video\//i.test(url || "");
  }
  function isYouTube(url) {
    return /youtube\.com\/watch\?v=|youtu\.be\//i.test(url || "");
  }
  // 安全提取 BV 号 / youtube id，避免依赖不可信输入
  function biliBvid(url) {
    var m = (url || "").match(/video\/(BV[0-9A-Za-z]+)/);
    return m ? m[1] : "";
  }
  function ytId(url) {
    var m = (url || "").match(/(?:v=|youtu\.be\/)([0-9A-Za-z_-]{6,})/);
    return m ? m[1] : "";
  }

  /* ---------- 渲染：资讯（KK日报风格聚合卡片） ---------- */
  function fmtNum(n) {
    n = n || 0;
    if (n >= 10000) return (n / 10000).toFixed(1) + " 万";
    return String(n);
  }
  function relTime(dateStr) {
    if (!dateStr) return "";
    var t = Date.parse(String(dateStr).replace(/-/g, "/"));
    if (isNaN(t)) return dateStr;
    var diff = (Date.now() - t) / 86400000;
    if (diff < 0) return dateStr;
    if (diff < 1) return "今天";
    if (diff < 2) return "昨天";
    if (diff < 30) return Math.floor(diff) + "天前";
    return dateStr;
  }
  function renderNewsCats() {
    var box = document.getElementById("newsCats");
    var cats = [];
    ALL_NEWS.forEach(function (n) { if (n.cat && cats.indexOf(n.cat) < 0) cats.push(n.cat); });
    var html = '<button data-c="" class="' + (NEWS_CAT === "" ? "on" : "") + '">全部</button>' +
      cats.map(function (c) { return '<button data-c="' + esc(c) + '" class="' + (NEWS_CAT === c ? "on" : "") + '">' + esc(c) + "</button>"; }).join("");
    box.innerHTML = html;
    box.querySelectorAll("button").forEach(function (b) {
      b.onclick = function () { NEWS_CAT = b.getAttribute("data-c") || ""; renderNewsCats(); renderNews(); };
    });
  }
  function renderNews() {
    var list = NEWS_CAT ? ALL_NEWS.filter(function (n) { return n.cat === NEWS_CAT; }) : ALL_NEWS;
    var panel = document.getElementById("newsList");
    panel.innerHTML = "";
    if (!list || !list.length) { panel.appendChild(el("div", "empty", "该分类暂无资讯")); return; }
    list.forEach(function (n) {
      var hasUrl = !!(n.url && n.url.trim());
      var card = el("div", "card clickable news-card");

      var row = el("div", "row");
      var thumb = el("div", "thumb");
      if (n.thumb) {
        thumb.innerHTML = '<img src="' + esc(n.thumb) + '" alt="封面" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=&quot;ph&quot;>📰</div>\'">';
      } else {
        thumb.innerHTML = '<div class="ph">📰</div>';
      }
      row.appendChild(thumb);

      var body = el("div", "body");
      var head = el("div", "card-head");
      head.innerHTML = '<div class="card-title">' + esc(n.title) + "</div>";
      body.appendChild(head);

      var meta = el("div", "card-meta");
      meta.innerHTML =
        '<span class="src-badge">' + esc(n.source || "未知来源") + "</span>" +
        "<span>📅 " + esc(n.date || "") + "</span>" +
        (relTime(n.date) ? '<span>🕒 ' + relTime(n.date) + "</span>" : "");
      body.appendChild(meta);

      var stats = el("div", "card-meta n-stats");
      stats.innerHTML =
        "<span>👁 " + fmtNum(n.views) + "</span>" +
        "<span>❤ " + fmtNum(n.likes) + "</span>";
      body.appendChild(stats);

      if (n.summary) body.appendChild(el("p", "card-summary", esc(n.summary)));
      if (n.content) {
        body.appendChild(el("div", "card-content", esc(n.content)));
        var toggle = el("div", "card-toggle", "▾ 展开全文");
        toggle.onclick = function (e) {
          e.stopPropagation();
          var ex = card.classList.toggle("expanded");
          toggle.textContent = ex ? "▴ 收起" : "▾ 展开全文";
        };
        body.appendChild(toggle);
      }
      if (hasUrl) {
        var link = el("a", "card-link", "🔗 查看原文 ↗");
        link.href = n.url; link.target = "_blank"; link.rel = "noopener";
        link.onclick = function (e) { e.stopPropagation(); };
        body.appendChild(link);
      }
      row.appendChild(body);
      card.appendChild(row);
      panel.appendChild(card);
    });
  }

  /* ---------- 渲染：直播 ---------- */
  function renderLive(list, panel) {
    panel.innerHTML = "";
    if (!list || !list.length) {
      panel.appendChild(el("div", "empty", "暂无直播"));
      return;
    }
    list.forEach(function (s) {
      var hasUrl = !!(s.url && s.url.trim());
      var card = el("div", "card clickable" + (hasUrl ? "" : " disabled"));
      if (hasUrl) {
        card.addEventListener("click", function () {
          if (s.url) window.open(s.url, "_blank", "noopener");
        });
      }

      var row = el("div", "row");
      var thumb = el("div", "thumb");
      thumb.innerHTML = '<div class="ph">' + esc(s.platform || "") + "</div>";
      row.appendChild(thumb);

      var body = el("div", "body");
      var titleHtml = esc(s.title || "未命名直播");
      var head = el("div", "card-head");
      head.innerHTML = '<div class="card-title">' + titleHtml + (hasUrl ? "" : ' <span style="font-size:12px;color:var(--muted);font-weight:400;">暂无链接</span>') + "</div>";
      var badge = el("span", "badge " + (s.live ? "badge-live" : "badge-offline"));
      badge.innerHTML = s.live ? '<span class="dot"></span>直播中' : "离线";
      head.appendChild(badge);
      body.appendChild(head);

      var meta = el("div", "card-meta");
      meta.innerHTML =
        '<span class="badge badge-platform">' + esc(s.platform || "") + "</span>" +
        "<span>主播：" + esc(s.streamer || "未知") + "</span>";
      body.appendChild(meta);

      var viewers = el("div", "viewers");
      viewers.innerHTML = "观看人数：<strong>" +
        (s.live ? fmtViewers(s.viewers) : "0") + "</strong>";
      body.appendChild(viewers);

      row.appendChild(body);
      card.appendChild(row);
      panel.appendChild(card);
    });
  }

  /* ---------- 渲染：视频 ---------- */
  function renderVideos(list, panel) {
    panel.innerHTML = "";
    if (!list || !list.length) {
      panel.appendChild(el("div", "empty", "暂无视频"));
      return;
    }
    list.forEach(function (v) {
      var hasUrl = !!(v.url && v.url.trim());
      var hasEmbed = !!(v.embed && v.embed.trim());
      var card = el("div", "card clickable" + (hasUrl || hasEmbed ? "" : " disabled"));

      var row = el("div", "row");
      var thumb = el("div", "thumb");
      if (v.thumb) {
        thumb.innerHTML = '<img src="' + esc(v.thumb) + '" alt="封面" loading="lazy" />';
      } else {
        thumb.innerHTML = '<div class="ph">' + esc(v.platform || "视频") + '</div>';
      }
      thumb.innerHTML += '<div class="play"></div>';
      if (v.duration) thumb.innerHTML += '<span class="dur">' + esc(v.duration) + "</span>";
      row.appendChild(thumb);

      var body = el("div", "body");
      var head = el("div", "card-head");
      head.innerHTML = '<div class="card-title">' + esc(v.title || "未命名视频") + (hasUrl || hasEmbed ? "" : ' <span style="font-size:12px;color:var(--muted);font-weight:400;">暂无链接</span>') + "</div>";
      head.appendChild(el("span", "badge badge-platform", esc(v.platform || "")));
      body.appendChild(head);

      var meta = el("div", "card-meta");
      meta.innerHTML = "<span>UP主：" + esc(v.author || "未知") + "</span>";
      body.appendChild(meta);
      row.appendChild(body);
      card.appendChild(row);

      // 嵌入式播放器容器（点击后插入）
      var embedWrap = el("div", "embed-wrap");
      embedWrap.style.display = "none";
      card.appendChild(embedWrap);

      if (hasUrl || hasEmbed) {
        card.addEventListener("click", function () {
          var src = "";
          if (v.embed && (v.embed.indexOf("player.bilibili.com") > -1 || v.embed.indexOf("youtube.com/embed") > -1)) {
            src = v.embed;
          } else if (isBili(v.url)) {
            var bv = biliBvid(v.url);
            if (bv) src = "https://player.bilibili.com/player.html?bvid=" + bv + "&autoplay=1";
          } else if (isYouTube(v.url)) {
            var yid = ytId(v.url);
            if (yid) src = "https://www.youtube.com/embed/" + yid;
          }

          if (src) {
            if (embedWrap.style.display === "none") {
              embedWrap.innerHTML =
                '<iframe src="' + esc(src) + '" allowfullscreen ' +
                'allow="autoplay; fullscreen" scrolling="no"></iframe>';
              embedWrap.style.display = "block";
              // 收回其它已展开的播放器，保持单栏整洁
              panel.querySelectorAll(".embed-wrap").forEach(function (w) {
                if (w !== embedWrap) { w.style.display = "none"; w.innerHTML = ""; }
              });
            } else {
              embedWrap.style.display = "none";
              embedWrap.innerHTML = "";
            }
          } else if (v.url) {
            window.open(v.url, "_blank", "noopener");
          }
        });
      }

      panel.appendChild(card);
    });
  }

  /* ---------- 标签切换 ---------- */
  function setupTabs() {
    var bar = document.getElementById("tabbar");
    bar.addEventListener("click", function (e) {
      var btn = e.target.closest("button[data-tab]");
      if (!btn) return;
      var tab = btn.getAttribute("data-tab");
      bar.querySelectorAll("button").forEach(function (b) {
        b.classList.toggle("active", b === btn);
      });
      ["news", "live", "videos"].forEach(function (t) {
        document.getElementById("panel-" + t)
          .classList.toggle("active", t === tab);
      });
    });
  }

  function setCounts(n, l, v) {
    document.getElementById("cnt-news").textContent = n;
    document.getElementById("cnt-live").textContent = l;
    document.getElementById("cnt-videos").textContent = v;
  }

  /* ---------- 引导 ---------- */
  function init(data) {
    ALL_NEWS = (data && Array.isArray(data.news)) ? data.news : SAMPLE_NEWS;
    var live = (data && Array.isArray(data.live)) ? data.live : SAMPLE_LIVE;
    var videos = (data && Array.isArray(data.videos)) ? data.videos : SAMPLE_VIDEOS;

    renderNewsCats();
    renderNews();
    renderLive(live, document.getElementById("panel-live"));
    renderVideos(videos, document.getElementById("panel-videos"));
    setCounts(ALL_NEWS.length, live.length, videos.length);
  }

  setupTabs();

  // 优先读取 data.json，失败则回退到内置示例
  fetch("data.json?_=" + Date.now(), { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (json) {
      init(json || {});
    })
    .catch(function () {
      init({});
    });
})();
</script>
</body>
</html>
