<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>战队 / 公会 · 三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="description" content="三角洲情报台 — 战队 / 公会 大厅与战绩分享">
  <meta name="theme-color" content="#0b0e14">
  <link rel="icon" href="icon.svg">
  <style>
    :root{
      --bg:#0b0e14;
      --card:#161b22;
      --border:#30363d;
      --text:#e6edf3;
      --muted:#8b949e;
      --green:#3fb950;
      --amber:#d29922;
      --red:#f85149;
      --blue:#58a6ff;
      --radius:12px;
      --maxw:960px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
      line-height:1.6;
      -webkit-text-size-adjust:100%;
    }
    a{color:var(--blue);text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:var(--maxw);margin:0 auto;padding:14px 16px 60px}

    header.topbar{
      position:sticky;top:0;z-index:20;
      background:rgba(11,14,20,.92);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--border);
    }
    .topbar-inner{
      max-width:var(--maxw);margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:12px 16px;
    }
    .brand{font-weight:700;font-size:18px;letter-spacing:.5px}
    .brand .ac{color:var(--green)}
    .backlink{font-size:14px;color:var(--muted)}

    /* tabs */
    nav.tabs{
      display:flex;gap:8px;flex-wrap:wrap;
      margin:16px 0 18px;border-bottom:1px solid var(--border);
    }
    .tab{
      padding:10px 16px;cursor:pointer;border:none;background:transparent;
      color:var(--muted);font-size:15px;font-weight:600;
      border-bottom:2px solid transparent;transition:.15s;
    }
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--text);border-bottom-color:var(--green)}

    .section{display:none}
    .section.active{display:block}

    /* cards */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .card{
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:16px;
      transition:.15s;cursor:pointer;
    }
    .card:hover{border-color:var(--green);transform:translateY(-2px)}
    .card h3{margin:0 0 6px;font-size:17px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .tag-badge{
      font-size:12px;font-weight:700;letter-spacing:1px;
      background:rgba(88,166,255,.15);color:var(--blue);
      border:1px solid rgba(88,166,255,.4);
      padding:2px 8px;border-radius:6px;
    }
    .meta{color:var(--muted);font-size:13px;margin:8px 0 0;display:flex;gap:12px;flex-wrap:wrap}
    .desc{color:var(--muted);font-size:14px;margin:10px 0 0;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .star{color:var(--amber);font-size:15px}

    .searchbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .searchbar input{flex:1;min-width:180px}

    input,select,textarea{
      background:#0d1117;color:var(--text);
      border:1px solid var(--border);border-radius:8px;
      padding:10px 12px;font-size:14px;font-family:inherit;width:100%;
    }
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
    textarea{resize:vertical;min-height:64px}
    label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:600}
    .hint{font-size:12px;color:var(--muted);margin-top:4px}

    .btn{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--green);color:#08130a;border:none;
      padding:10px 18px;border-radius:8px;font-weight:700;font-size:14px;
      cursor:pointer;transition:.15s;font-family:inherit;
    }
    .btn:hover{filter:brightness(1.08)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn.secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn.secondary:hover{border-color:var(--green)}
    .btn.danger{background:var(--red);color:#fff}
    .btn.amber{background:var(--amber);color:#1a1304}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

    .msg{font-size:13px;margin:10px 0;padding:10px 12px;border-radius:8px;display:none}
    .msg.err{display:block;background:rgba(248,81,73,.12);border:1px solid var(--red);color:#ffb3ae}
    .msg.ok{display:block;background:rgba(63,185,80,.12);border:1px solid var(--green);color:#b6f0bf}

    .empty{
      text-align:center;color:var(--muted);padding:40px 16px;
      border:1px dashed var(--border);border-radius:var(--radius);
    }

    /* detail */
    .detail-head{background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:18px;margin-bottom:16px}
    .detail-head h2{margin:0 0 8px;font-size:22px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .detail-head .sub{color:var(--muted);font-size:14px;display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
    .block-title{font-size:15px;font-weight:700;margin:22px 0 12px;
      padding-left:10px;border-left:3px solid var(--green)}

    .member-row,.record-row{
      background:var(--card);border:1px solid var(--border);
      border-radius:10px;padding:12px 14px;margin-bottom:10px;
      display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;
    }
    .record-main{flex:1;min-width:200px}
    .role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;
      background:rgba(139,148,158,.15);color:var(--muted)}
    .role-badge.owner{background:rgba(210,153,34,.18);color:var(--amber)}
    .role-badge.admin{background:rgba(88,166,255,.18);color:var(--blue)}
    .res-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px}
    .res-badge.win{background:rgba(63,185,80,.18);color:var(--green)}
    .res-badge.lose{background:rgba(248,81,73,.18);color:var(--red)}
    .kvs{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:6px}
    .kvs b{color:var(--text);font-weight:600}

    /* gate */
    #gate{
      text-align:center;padding:60px 20px;
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      margin-top:30px;
    }
    #gate h2{margin:0 0 12px}
    #gate p{color:var(--muted)}

    /* record form modal-ish */
    .panel{background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:18px;margin-top:14px;display:none}
    .panel.show{display:block}

    /* toasts */
    #toasts{position:fixed;left:0;right:0;bottom:18px;z-index:60;
      display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
    .toast{
      background:#1c2230;border:1px solid var(--border);color:var(--text);
      padding:12px 18px;border-radius:10px;font-size:14px;max-width:90vw;
      box-shadow:0 8px 24px rgba(0,0,0,.4);
      opacity:0;transform:translateY(12px);transition:.25s;
    }
    .toast.show{opacity:1;transform:none}
    .toast.err{border-color:var(--red);color:#ffb3ae}
    .toast.ok{border-color:var(--green);color:#b6f0bf}

    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--muted);
      border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:560px){
      .topbar-inner{padding:10px 12px}
      .brand{font-size:16px}
      .grid{grid-template-columns:1fr}
      .tab{padding:9px 12px;font-size:14px}
    }

    /* 战队群聊 */
    .chat-block{margin-top:18px}
    .chat-win{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      display:flex;flex-direction:column;height:380px;overflow:hidden}
    .chat-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
    .chat-bubble{max-width:74%;padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.4;word-break:break-word}
    .chat-bubble .sender{display:block;font-size:11px;color:var(--muted);margin-bottom:2px}
    .chat-bubble .time{display:block;font-size:11px;color:var(--muted);margin-top:4px}
    .chat-me{align-self:flex-end}
    .chat-me .chat-bubble{background:var(--green);color:#08130a}
    .chat-them{align-self:flex-start}
    .chat-them .chat-bubble{background:#0d1117;border:1px solid var(--border)}
    .chat-input-row{display:flex;gap:8px;border-top:1px solid var(--border);padding:10px;background:rgba(255,255,255,.02)}
    .chat-input-row input{flex:1}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">三角洲<span class="ac">情报台</span> · 战队/公会</div>
      <a class="backlink" href="index.html">← 返回首页</a>
    </div>
  </header>

  <div class="wrap" id="root">
    <!-- 登录拦截 -->
    <div id="gate" style="display:none">
      <h2>🔒 请先登录战友账号</h2>
      <p>战队大厅与战绩分享需要登录后才能使用。</p>
      <p style="margin-top:16px"><a class="btn" href="forum.html">前往论坛登录 / 注册</a></p>
    </div>

    <!-- 主应用 -->
    <div id="app" style="display:none">
      <nav class="tabs">
        <button class="tab active" data-view="lobby">战队大厅</button>
        <button class="tab" data-view="mine">我的战队</button>
        <button class="tab" data-view="create">创建战队</button>
      </nav>

      <!-- 大厅 -->
      <section class="section active" id="view-lobby">
        <div class="searchbar">
          <input id="searchInput" type="text" placeholder="搜索战队名 / 标签…" aria-label="搜索战队">
          <button class="btn" id="searchBtn">搜索</button>
          <button class="btn secondary" id="clearSearchBtn">清空</button>
        </div>
        <div id="lobbyMsg" class="msg"></div>
        <div id="lobbyGrid" class="grid"></div>
      </section>

      <!-- 我的战队 -->
      <section class="section" id="view-mine">
        <div class="btn-row" style="margin-bottom:16px">
          <button class="btn" id="mineRefresh">刷新</button>
        </div>
        <div id="mineMsg" class="msg"></div>
        <div id="mineList"></div>
      </section>

      <!-- 创建战队 -->
      <section class="section" id="view-create">
        <div class="detail-head">
          <h2>创建新战队</h2>
          <p class="sub">组建你的小队，邀请战友，分享作战战绩。</p>
        </div>
        <div id="createMsg" class="msg"></div>
        <label for="cName">队名（2–20 字）</label>
        <input id="cName" type="text" maxlength="20" placeholder="例如：暗夜突击队">
        <label for="cTag">标签 TAG（1–6 位大写字母 / 数字）</label>
        <input id="cTag" type="text" maxlength="6" placeholder="例如：DNF26" style="text-transform:uppercase">
        <div class="hint">成员在卡片上看到的短标识，只能是大写字母和数字。</div>
        <label for="cDesc">简介</label>
        <textarea id="cDesc" maxlength="200" placeholder="一句话介绍你们的擅长模式、作息与招募要求…"></textarea>
        <div class="btn-row" style="margin-top:18px">
          <button class="btn" id="createBtn">创建战队</button>
        </div>
      </section>

      <!-- 战队详情 -->
      <section class="section" id="view-detail">
        <a class="backlink" href="#" id="backToLobby">← 返回大厅</a>
        <div id="detailBody"></div>
      </section>
    </div>
  </div>

  <div id="toasts"></div>

  <script>
  (function(){
    "use strict";
    var API = "https://api.delta.shopping";
    var token = localStorage.getItem("di_user_token");
    var uid   = localStorage.getItem("di_user_id") || "";
    var urole = localStorage.getItem("di_user_role") || "";
    var curTeamId = null, curTeamIsMember = false;  // 战队群聊轮询状态

    // ---------- 工具 ----------
    function el(id){ return document.getElementById(id); }
    function esc(s){
      return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
        return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
      });
    }
    function fmtTime(t){
      if(!t) return "";
      var d = new Date(t);
      if(isNaN(d.getTime())) return esc(t);
      var p = function(n){ return (n<10?"0":"")+n; };
      return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
    }
    function maskEmail(e){
      if(!e) return "未知战友";
      var at = e.indexOf("@");
      if(at < 0) return e;
      var name = e.slice(0, at), dom = e.slice(at);
      if(name.length <= 1) return "*" + dom;
      return name.slice(0,2) + "***" + dom;
    }

    function toast(msg, type){
      var t = document.createElement("div");
      t.className = "toast " + (type || "info");
      t.textContent = msg;
      el("toasts").appendChild(t);
      requestAnimationFrame(function(){ t.classList.add("show"); });
      setTimeout(function(){
        t.classList.remove("show");
        setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 300);
      }, 3400);
    }
    function setMsg(boxId, msg, type){
      var b = el(boxId);
      if(!b) return;
      b.textContent = msg || "";
      b.className = "msg" + (type ? " " + type : "");
    }

    // ---------- API ----------
    function api(path, opts){
      opts = opts || {};
      opts.headers = opts.headers || {};
      opts.headers["Authorization"] = "Bearer " + token;
      if(opts.body && !opts.headers["Content-Type"]){
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(opts.body);
      }
      return fetch(API + path, opts).then(function(res){
        var data = null;
        return res.text().then(function(txt){
          try { data = txt ? JSON.parse(txt) : null; } catch(e){ data = null; }
          if(!res.ok){
            var err = (data && data.error) ? data.error : ("请求失败（HTTP " + res.status + "）");
            throw new Error(err);
          }
          return data;
        });
      });
    }

    // ---------- 视图切换 ----------
    function showView(name){
      var tabs = document.querySelectorAll(".tab");
      tabs.forEach(function(t){ t.classList.toggle("active", t.getAttribute("data-view") === name); });
      ["lobby","mine","create","detail"].forEach(function(v){
        el("view-" + v).classList.toggle("active", v === name);
      });
      if(name === "lobby") loadLobby(el("searchInput").value.trim());
      if(name === "mine") loadMine();
    }

    document.querySelectorAll(".tab").forEach(function(t){
      t.addEventListener("click", function(){ showView(t.getAttribute("data-view")); });
    });

    // ---------- 大厅 ----------
    function teamCard(t){
      var star = t.featured ? '<span class="star" title="置顶推荐">★</span>' : "";
      return '<div class="card" data-id="'+esc(t.id)+'">'+
        '<h3><span class="tag-badge">'+esc(t.tag)+'</span>'+esc(t.name)+star+'</h3>'+
        '<p class="desc">'+esc(t.desc || "暂无简介")+'</p>'+
        '<div class="meta"><span>👥 '+esc(t.memberCount)+' 人</span>'+
        (t.owner ? '<span>👤 '+esc(maskEmail(t.owner))+'</span>' : '')+'</div>'+
      '</div>';
    }
    function loadLobby(q){
      var box = el("lobbyGrid");
      box.innerHTML = '<div class="empty"><span class="spinner"></span> 加载中…</div>';
      setMsg("lobbyMsg","");
      var url = "/api/teams" + (q ? ("?q=" + encodeURIComponent(q)) : "");
      api(url).then(function(d){
        var list = (d && d.teams) || [];
        if(!list.length){
          box.innerHTML = '<div class="empty">没有找到战队。换个关键词，或前往「创建战队」组建自己的小队。</div>';
          return;
        }
        box.innerHTML = list.map(teamCard).join("");
        Array.prototype.forEach.call(box.querySelectorAll(".card"), function(c){
          c.addEventListener("click", function(){ openDetail(c.getAttribute("data-id")); });
        });
      }).catch(function(e){
        box.innerHTML = "";
        setMsg("lobbyMsg", "加载失败：" + e.message, "err");
      });
    }
    el("searchBtn").addEventListener("click", function(){ loadLobby(el("searchInput").value.trim()); });
    el("searchInput").addEventListener("keydown", function(e){ if(e.key === "Enter") loadLobby(el("searchInput").value.trim()); });
    el("clearSearchBtn").addEventListener("click", function(){ el("searchInput").value=""; loadLobby(""); });

    // ---------- 我的战队 ----------
    function mineCard(t){
      var roleTxt = {owner:"队长",admin:"管理",member:"成员"}[t.role] || t.role;
      return '<div class="member-row">'+
        '<div class="record-main"><strong>'+esc(t.name)+'</strong> '+
        '<span class="tag-badge">'+esc(t.tag)+'</span>'+
        '<div class="kvs"><span>👥 '+esc(t.memberCount)+' 人</span><span>我的身份：'+esc(roleTxt)+'</span></div></div>'+
        '<div class="btn-row"><button class="btn secondary" data-open="'+esc(t.id)+'">查看</button></div>'+
      '</div>';
    }
    function loadMine(){
      var box = el("mineList");
      box.innerHTML = '<div class="empty"><span class="spinner"></span> 加载中…</div>';
      setMsg("mineMsg","");
      api("/api/teams/mine").then(function(d){
        var list = (d && d.teams) || [];
        if(!list.length){
          box.innerHTML = '<div class="empty">你还没有加入任何战队。<br>去「战队大厅」找队友，或「创建战队」当队长。</div>';
          return;
        }
        box.innerHTML = list.map(mineCard).join("");
        Array.prototype.forEach.call(box.querySelectorAll("[data-open]"), function(b){
          b.addEventListener("click", function(){ openDetail(b.getAttribute("data-open")); });
        });
      }).catch(function(e){
        box.innerHTML = "";
        setMsg("mineMsg", "加载失败：" + e.message, "err");
      });
    }
    el("mineRefresh").addEventListener("click", loadMine);

    // ---------- 创建战队 ----------
    el("createBtn").addEventListener("click", function(){
      var name = el("cName").value.trim();
      var tag  = el("cTag").value.trim().toUpperCase();
      var desc = el("cDesc").value.trim();
      setMsg("createMsg","");
      if(name.length < 2 || name.length > 20){ setMsg("createMsg","队名需 2–20 字。","err"); return; }
      if(!/^[A-Z0-9]{1,6}$/.test(tag)){ setMsg("createMsg","标签需 1–6 位大写字母或数字。","err"); return; }
      var btn = el("createBtn");
      btn.disabled = true; btn.textContent = "创建中…";
      api("/api/teams", { method:"POST", body:{ name:name, tag:tag, desc:desc } })
        .then(function(d){
          toast("战队创建成功！", "ok");
          el("cName").value=""; el("cTag").value=""; el("cDesc").value="";
          showView("mine");
        })
        .catch(function(e){ setMsg("createMsg","创建失败：" + e.message, "err"); })
        .finally(function(){ btn.disabled=false; btn.textContent="创建战队"; });
    });

    // ---------- 详情 ----------
    function roleBadge(role){
      var txt = {owner:"队长",admin:"管理",member:"成员"}[role] || role;
      var cls = role === "owner" ? "owner" : (role === "admin" ? "admin" : "");
      return '<span class="role-badge '+cls+'">'+esc(txt)+'</span>';
    }
    function recordRow(r){
      var res = r.result === "win"
        ? '<span class="res-badge win">胜</span>'
        : '<span class="res-badge lose">负</span>';
      return '<div class="record-row">'+
        '<div class="record-main"><div>'+res+' <strong>'+esc(r.mode || "未知模式")+'</strong>'+
        ' <span style="color:var(--muted);font-size:13px">by '+esc(maskEmail(r.by))+'</span></div>'+
        '<div class="kvs"><span>KD <b>'+esc(r.kd)+'</b></span><span>分数 <b>'+esc(r.score)+'</b></span>'+
        '<span>'+fmtTime(r.createdAt)+'</span></div>'+
        (r.note ? '<div style="margin-top:6px;color:var(--muted);font-size:13px">📝 '+esc(r.note)+'</div>' : '')+
        '</div></div>';
    }
    function openDetail(id){
      var body = el("detailBody");
      body.innerHTML = '<div class="empty"><span class="spinner"></span> 加载战队信息…</div>';
      showView("detail");

      // 同时取详情与「我的战队」，用于判断身份
      Promise.all([
        api("/api/teams/" + id),
        api("/api/teams/mine").catch(function(){ return {teams:[]}; })
      ]).then(function(res){
        var d = res[0], mine = res[1];
        var team = d.team;
        if(!team){ body.innerHTML = '<div class="empty">未找到该战队。</div>'; return; }

        var mineEntry = (mine.teams || []).filter(function(t){ return t.id === id; })[0];
        var myRole = mineEntry ? mineEntry.role : null; // owner/admin/member
        var isMember = !!myRole;
        var isOwner = myRole === "owner" || urole === "super";

        var members = (team.members || []).map(function(m){
          return '<div class="member-row"><div class="record-main">'+
            '<strong>'+esc(maskEmail(m.email))+'</strong> '+roleBadge(m.role)+'</div>'+
            '<span style="color:var(--muted);font-size:13px">'+fmtTime(m.joinedAt)+'</span></div>';
        }).join("") || '<div class="empty" style="padding:20px">暂无成员</div>';

        var recs = (team.records || []).slice().sort(function(a,b){
          return new Date(b.createdAt) - new Date(a.createdAt);
        }).map(recordRow).join("") || '<div class="empty" style="padding:20px">还没有战绩，快来提交第一场！</div>';

        // 操作按钮
        var actions = '<div class="btn-row">';
        if(!isMember){
          actions += '<button class="btn" id="actJoin">加入战队</button>';
        } else {
          if(!isOwner) actions += '<button class="btn secondary" id="actLeave">退出战队</button>';
          actions += '<button class="btn amber" id="actRecord">提交战绩</button>';
          if(isOwner) actions += '<button class="btn danger" id="actDelete">解散战队</button>';
        }
        actions += '</div>';

        body.innerHTML =
          '<div class="detail-head">'+
            '<h2><span class="tag-badge">'+esc(team.tag)+'</span>'+esc(team.name)+
            (team.featured ? ' <span class="star" title="置顶推荐">★</span>' : '')+'</h2>'+
            '<p class="sub"><span>👤 队长 '+esc(maskEmail(team.owner))+'</span>'+
            '<span>👥 '+esc(team.memberCount)+' 人</span>'+
            (isOwner ? '<span style="color:var(--amber)">你的身份：队长</span>' : (isMember ? '<span style="color:var(--blue)">你的身份：成员</span>' : '<span style="color:var(--muted)">你还未加入</span>'))+
            '</p>'+
            (team.desc ? '<p style="margin:12px 0 0;color:var(--muted)">'+esc(team.desc)+'</p>' : '')+
          '</div>'+
          actions+
          '<div id="detailMsg" class="msg"></div>'+
          '<div class="panel" id="recordPanel">'+
            '<div class="block-title" style="margin-top:0">提交战绩</div>'+
            '<label for="rMode">模式</label>'+
            '<input id="rMode" type="text" maxlength="20" placeholder="例如：全面战场 / 危险行动">'+
            '<label for="rResult">结果</label>'+
            '<select id="rResult"><option value="win">胜</option><option value="lose">负</option></select>'+
            '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
              '<div style="flex:1;min-width:120px"><label for="rKd">KD</label><input id="rKd" type="number" step="0.01" min="0" placeholder="0.00"></div>'+
              '<div style="flex:1;min-width:120px"><label for="rScore">分数</label><input id="rScore" type="number" step="1" min="0" placeholder="0"></div>'+
            '</div>'+
            '<label for="rNote">备注</label>'+
            '<textarea id="rNote" maxlength="200" placeholder="可选：本场亮点、队友配合…"></textarea>'+
            '<div class="btn-row" style="margin-top:14px"><button class="btn" id="rSubmit">提交</button>'+
            '<button class="btn secondary" id="rCancel">取消</button></div>'+
          '</div>'+
          '<div class="block-title">成员（'+esc(team.memberCount)+'）</div>'+
          members+
          '<div class="block-title">战绩记录</div>'+
          recs+
          '<div class="chat-block">'+
            '<div class="block-title" style="margin-top:22px">💬 战队群聊</div>'+
            (isMember
              ? '<div class="chat-win"><div class="chat-scroll" id="teamChatScroll"></div>'+
                '<div class="chat-input-row"><input id="teamChatInput" type="text" placeholder="发条消息给队友…" maxlength="500" aria-label="群聊消息">'+
                '<button class="btn" id="teamChatSend">发送</button></div></div>'
              : '<div class="empty" style="padding:20px">加入战队后即可参与战队群聊 💬</div>')+
          '</div>';

        // 绑定操作
        var j = el("actJoin");   if(j) j.addEventListener("click", function(){ joinTeam(id); });
        var l = el("actLeave");  if(l) l.addEventListener("click", function(){ leaveTeam(id); });
        var del = el("actDelete"); if(del) del.addEventListener("click", function(){ deleteTeam(id, team.name); });
        var rp = el("recordPanel");
        var ar = el("actRecord"); if(ar) ar.addEventListener("click", function(){ rp.classList.toggle("show"); });
        var rc = el("rCancel"); if(rc) rc.addEventListener("click", function(){ rp.classList.remove("show"); });
        var rs = el("rSubmit"); if(rs) rs.addEventListener("click", function(){ submitRecord(id); });

        // 战队群聊
        if (window.__teamChatTimer) { clearInterval(window.__teamChatTimer); window.__teamChatTimer = null; }
        if (isMember) {
          curTeamId = id; curTeamIsMember = true;
          loadTeamChat(id);
          var tci = el("teamChatInput");
          var tcs = el("teamChatSend");
          if (tci) tci.addEventListener("keydown", function (e) { if (e.key === "Enter") sendTeamChat(id); });
          if (tcs) tcs.addEventListener("click", function () { sendTeamChat(id); });
          window.__teamChatTimer = setInterval(function () {
            if (curTeamIsMember && el("view-detail").classList.contains("active")) loadTeamChat(id);
          }, 8000);
        } else {
          curTeamId = null; curTeamIsMember = false;
        }
      }).catch(function(e){
        body.innerHTML = '<div class="empty">加载失败：'+esc(e.message)+'</div>';
      });
    }

    el("backToLobby").addEventListener("click", function(e){
      e.preventDefault(); showView("lobby");
    });

    function joinTeam(id){
      api("/api/teams/" + id + "/join", { method:"POST" })
        .then(function(){ toast("已加入战队！","ok"); openDetail(id); })
        .catch(function(e){ toast("加入失败：" + e.message, "err"); });
    }
    function leaveTeam(id){
      if(!confirm("确定退出该战队吗？")) return;
      api("/api/teams/" + id + "/leave", { method:"POST" })
        .then(function(){ toast("已退出战队。","ok"); openDetail(id); })
        .catch(function(e){ toast("退出失败：" + e.message, "err"); });
    }
    function deleteTeam(id, name){
      if(!confirm("确定解散「" + name + "」吗？此操作不可撤销。")) return;
      api("/api/teams/" + id, { method:"DELETE" })
        .then(function(){ toast("战队已解散。","ok"); showView("mine"); })
        .catch(function(e){ toast("解散失败：" + e.message, "err"); });
    }
    function submitRecord(id){
      var mode = el("rMode").value.trim();
      var result = el("rResult").value;
      var kd = parseFloat(el("rKd").value);
      var score = parseFloat(el("rScore").value);
      var note = el("rNote").value.trim();
      setMsg("detailMsg","");
      if(!mode){ setMsg("detailMsg","请填写模式。","err"); return; }
      if(isNaN(kd) || kd < 0){ setMsg("detailMsg","KD 需为非负数字。","err"); return; }
      if(isNaN(score) || score < 0){ setMsg("detailMsg","分数需为非负数字。","err"); return; }
      var btn = el("rSubmit"); btn.disabled=true; btn.textContent="提交中…";
      api("/api/teams/" + id + "/record", { method:"POST",
        body:{ mode:mode, result:result, kd:kd, score:score, note:note } })
        .then(function(){ toast("战绩已提交！","ok"); openDetail(id); })
        .catch(function(e){ setMsg("detailMsg","提交失败：" + e.message, "err"); })
        .finally(function(){ btn.disabled=false; btn.textContent="提交"; });
    }

    // ---------- 战队群聊 ----------
    function loadTeamChat(tid){
      var box = el("teamChatScroll");
      if(!box) return;
      api("/api/teams/" + tid + "/chat").then(function(d){
        var msgs = (d && d.messages) || [];
        if(!msgs.length){ box.innerHTML = '<div class="chat-empty">还没有消息，喊队友开黑吧 🎮</div>'; return; }
        box.innerHTML = msgs.map(function(m){
          var me = (m.from === uid.toLowerCase());
          var sender = me ? "" : '<span class="sender">'+esc(maskEmail(m.name || m.from))+'</span>';
          return '<div class="chat-'+(me?"me":"them")+'"><div class="chat-bubble">'+sender+esc(m.text)+
            '<span class="time">'+fmtTime(m.ts)+'</span></div></div>';
        }).join("");
        box.scrollTop = box.scrollHeight;
      }).catch(function(){ /* 保持现状，等待下次轮询 */ });
    }
    function sendTeamChat(tid){
      var inp = el("teamChatInput"); if(!inp) return;
      var text = inp.value.trim(); if(!text) return;
      var btn = el("teamChatSend"); if(btn) btn.disabled = true;
      api("/api/teams/" + tid + "/chat", { method:"POST", body:{ text:text } })
        .then(function(){ inp.value=""; loadTeamChat(tid); })
        .catch(function(e){ toast("发送失败：" + e.message, "err"); })
        .finally(function(){ if(btn) btn.disabled = false; });
    }

    // ---------- 启动 ----------
    if(!token){
      el("gate").style.display = "block";
    } else {
      el("app").style.display = "block";
      loadLobby("");
    }
  })();
  </script>
</body>
</html>
