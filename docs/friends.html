<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>🧑‍🤝‍🧑 好友 · 三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="manifest.webmanifest?v=41">
  <link rel="icon" href="icon.svg?v=41">
  <link rel="stylesheet" href="css/style.css?v=41">
  <style>
    body { background: var(--bg); color: var(--text); }
    .friends-wrap {
      max-width: 1080px; margin: 0 auto; padding: 16px;
    }
    .back-home {
      display: inline-block; margin: 8px 0 4px; color: var(--muted);
      text-decoration: none; font-size: 14px;
    }
    .back-home:hover { color: var(--accent); }
    .page-title { margin: 4px 0 16px; font-size: 22px; }

    .friends-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
    }
    .panel h2 {
      font-size: 15px; margin: 0 0 10px; color: var(--muted);
      text-transform: none; letter-spacing: .3px;
    }

    /* 加好友搜索 */
    .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .add-row input {
      flex: 1; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
    }
    .btn {
      border: 1px solid var(--border); background: var(--bg-soft, #1f242d);
      color: var(--text); border-radius: 8px; padding: 8px 12px; cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { color: var(--accent); }
    .btn.primary { background: var(--accent); color: #1a1300; border-color: var(--accent); font-weight: 600; }
    .btn.sm { padding: 4px 10px; font-size: 12px; }
    .btn.danger:hover { color: #ff5a5a; }

    .search-results, .incoming-list, .friend-list { display: flex; flex-direction: column; gap: 6px; }
    .row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px; border-radius: 10px; background: var(--bg);
      border: 1px solid transparent;
    }
    .row.active { border-color: var(--accent); }
    .row .avatar {
      width: 38px; height: 38px; border-radius: 50%; flex: none;
      background: var(--bg-soft, #1f242d); object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-weight: 600; font-size: 14px; overflow: hidden;
    }
    .row .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .row .meta { flex: 1; min-width: 0; }
    .row .name { font-size: 14px; font-weight: 600; }
    .row .sub { font-size: 12px; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .dot.on { background: #3ddc84; box-shadow: 0 0 6px rgba(61,220,132,.6); }
    .dot.off { background: #888; }
    .row .actions { display: flex; gap: 6px; flex: none; }
    .empty { color: var(--muted); font-size: 13px; padding: 6px 2px; }

    .section + .section { margin-top: 16px; }

    /* 聊天区 */
    .chat-panel { display: flex; flex-direction: column; min-height: 480px; }
    .chat-head { display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .chat-head .name { font-weight: 600; }
    .chat-body {
      flex: 1; overflow-y: auto; padding: 12px 4px; display: flex;
      flex-direction: column; gap: 10px; min-height: 280px;
    }
    .bubble { max-width: 72%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }
    .bubble .time { display: block; font-size: 11px; color: var(--muted); margin-top: 4px; }
    .msg.them { align-self: flex-start; }
    .msg.them .bubble { background: var(--bg-soft, #1f242d); border: 1px solid var(--border); }
    .msg.me { align-self: flex-end; }
    .msg.me .bubble { background: var(--accent); color: #1a1300; }
    .msg.me .bubble .time { color: #5a4a00; }
    .chat-input { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 8px; }
    .chat-input input {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
    }
    .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); }

    .login-gate { text-align: center; padding: 40px 16px; }
    .login-gate p { color: var(--muted); margin-bottom: 16px; }

    @media (max-width: 760px) {
      .friends-grid { grid-template-columns: 1fr; }
      .chat-panel { min-height: 60vh; }
    }
  </style>
</head>
<body>
  <div id="siteAnnounce" class="site-announce"></div>

  <div class="friends-wrap">
    <a class="back-home" href="index.html">← 返回首页</a>
    <h1 class="page-title">🧑‍🤝‍🧑 <span data-i18n="friends_title" data-i18n-zh="好友">好友</span></h1>

    <!-- 未登录提示 -->
    <div id="loginGate" class="login-gate" style="display:none">
      <p>请先登录后查看好友与私聊。</p>
      <a class="btn primary" href="forum.html">去登录</a>
    </div>

    <!-- 已登录主体 -->
    <div id="mainUI" class="friends-grid" style="display:none">
      <!-- 左侧：好友 + 加好友 + 请求 -->
      <div class="left-col">
        <div class="panel section">
          <h2 data-i18n="add_friend" data-i18n-zh="添加好友">添加好友</h2>
          <div class="add-row">
            <input id="searchInput" type="text" placeholder="搜索用户名 / ID" data-i18n="search_user_ph" data-i18n-ph="1"
                   data-i18n-zh="搜索用户名 / ID">
            <button class="btn" id="searchBtn" data-i18n="btn_search" data-i18n-zh="搜索">搜索</button>
          </div>
          <div class="search-results" id="searchResults"></div>
        </div>

        <div class="panel section">
          <h2 data-i18n="incoming_requests" data-i18n-zh="好友请求">好友请求</h2>
          <div class="incoming-list" id="incomingList"></div>
        </div>

        <div class="panel section">
          <h2 data-i18n="friends_title" data-i18n-zh="好友列表">好友列表</h2>
          <div class="friend-list" id="friendList"></div>
        </div>
      </div>

      <!-- 右侧：私聊 -->
      <div class="panel chat-panel">
        <div id="chatEmpty" class="chat-empty">选择一个好友开始聊天 💬</div>
        <div id="chatView" style="display:none;flex:1;flex-direction:column;min-height:0">
          <div class="chat-head">
            <span id="chatAvatarWrap"></span>
            <span class="name" id="chatName"></span>
            <span class="dot off" id="chatDot"></span>
            <button class="btn sm danger" id="removeBtn" style="margin-left:auto">移除</button>
          </div>
          <div class="chat-body" id="chatBody"></div>
          <div class="chat-input">
            <input id="msgInput" type="text" placeholder="输入消息…" data-i18n="chat_ph" data-i18n-ph="1" data-i18n-zh="输入消息…">
            <button class="btn primary" id="sendBtn" data-i18n="btn_send" data-i18n-zh="发送">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/site-common.js?v=41"></script>
  <script defer src="js/i18n.js?v=41"></script>
  <script>
    (function () {
      "use strict";
      var D = window.DeltaCommon;
      if (!D) { document.getElementById("siteAnnounce").textContent = "共享脚本加载失败"; return; }

      // 未登录：显示提示 + 去 forum.html，不调用需要登录的接口
      if (!D.isLogin()) {
        document.getElementById("loginGate").style.display = "block";
        return;
      }
      document.getElementById("mainUI").style.display = "grid";

      var el = {
        searchInput: document.getElementById("searchInput"),
        searchBtn: document.getElementById("searchBtn"),
        searchResults: document.getElementById("searchResults"),
        incomingList: document.getElementById("incomingList"),
        friendList: document.getElementById("friendList"),
        chatEmpty: document.getElementById("chatEmpty"),
        chatView: document.getElementById("chatView"),
        chatAvatarWrap: document.getElementById("chatAvatarWrap"),
        chatName: document.getElementById("chatName"),
        chatDot: document.getElementById("chatDot"),
        chatBody: document.getElementById("chatBody"),
        msgInput: document.getElementById("msgInput"),
        sendBtn: document.getElementById("sendBtn"),
        removeBtn: document.getElementById("removeBtn")
      };

      var myId = D.getId();
      var activeId = null;       // 当前打开聊天的好友 id
      var activeName = "";
      var friendsCache = [];     // 最近一次拉取的好友列表

      function avatarHtml(av, name) {
        if (av) return '<span class="avatar"><img src="' + D.esc(av) + '" alt=""></span>';
        var ch = (name || "?").slice(0, 1);
        return '<span class="avatar">' + D.esc(ch) + '</span>';
      }

      // 渲染好友列表（由 poll 周期性调用，不触碰聊天区）
      function renderFriends() {
        D.friends().then(function (j) {
          friendsCache = j.friends || [];
          var incoming = j.incoming || [];

          // 好友列表
          if (!friendsCache.length) {
            el.friendList.innerHTML = '<div class="empty" data-i18n="no_friend" data-i18n-zh="还没有好友，去加几个吧！">还没有好友，去加几个吧！</div>';
          } else {
            el.friendList.innerHTML = friendsCache.map(function (f) {
              var dotCls = f.online ? "on" : "off";
              var sub = f.online ? '<span data-i18n="online" data-i18n-zh="在线">在线</span>'
                                 : ('<span data-i18n="offline" data-i18n-zh="离线">离线</span> · ' + D.fmt(f.lastSeen));
              return '<div class="row' + (f.id === activeId ? ' active' : '') + '" data-id="' + D.esc(f.id) + '">' +
                avatarHtml(f.avatar, f.name) +
                '<div class="meta"><div class="name">' + D.esc(f.name) + '</div>' +
                '<div class="sub">' + sub + '</div></div>' +
                '<span class="dot ' + dotCls + '"></span></div>';
            }).join("");
            el.friendList.querySelectorAll(".row").forEach(function (r) {
              r.addEventListener("click", function () { openChat(r.getAttribute("data-id")); });
            });
          }

          // 好友请求
          if (!incoming.length) {
            el.incomingList.innerHTML = '<div class="empty">暂无新请求</div>';
          } else {
            el.incomingList.innerHTML = incoming.map(function (r) {
              return '<div class="row" data-id="' + D.esc(r.id) + '">' +
                avatarHtml(null, r.name) +
                '<div class="meta"><div class="name">' + D.esc(r.name) + '</div>' +
                '<div class="sub">请求添加你为好友</div></div>' +
                '<div class="actions">' +
                '<button class="btn sm primary" data-act="accept" data-id="' + D.esc(r.id) + '">接受</button>' +
                '<button class="btn sm" data-act="reject" data-id="' + D.esc(r.id) + '">拒绝</button>' +
                '</div></div>';
            }).join("");
            el.incomingList.querySelectorAll("button[data-act]").forEach(function (b) {
              b.addEventListener("click", function () {
                var from = b.getAttribute("data-id");
                var act = b.getAttribute("data-act");
                D.friendRespond(from, act === "accept" ? "accept" : "reject")
                  .then(function () { renderFriends(); })
                  .catch(function (e) { alert(e.message || "操作失败"); });
              });
            });
          }

          // 同步聊天头部在线点（不打断聊天内容）
          if (activeId) {
            var af = friendsCache.filter(function (f) { return f.id === activeId; })[0];
            if (af) el.chatDot.className = "dot " + (af.online ? "on" : "off");
          }
        }).catch(function (e) { /* 静默，等待下次 poll */ });
      }

      // 搜索用户
      function doSearch() {
        var q = (el.searchInput.value || "").trim();
        if (!q) { el.searchResults.innerHTML = '<div class="empty">请输入关键词</div>'; return; }
        el.searchResults.innerHTML = '<div class="empty">搜索中…</div>';
        D.friendSearch(q).then(function (j) {
          var users = j.users || [];
          var ids = {};
          (friendsCache || []).forEach(function (f) { ids[f.id] = 1; });
          if (!users.length) { el.searchResults.innerHTML = '<div class="empty">未找到用户</div>'; return; }
          el.searchResults.innerHTML = users.map(function (u) {
            var isFriend = ids[u.id];
            var btn = isFriend
              ? '<button class="btn sm" disabled>已是好友</button>'
              : '<button class="btn sm primary" data-add="' + D.esc(u.id) + '">添加</button>';
            return '<div class="row">' + avatarHtml(u.avatar, u.name) +
              '<div class="meta"><div class="name">' + D.esc(u.name) + '</div></div>' +
              '<div class="actions">' + btn + '</div></div>';
          }).join("");
          el.searchResults.querySelectorAll("button[data-add]").forEach(function (b) {
            b.addEventListener("click", function () {
              var id = b.getAttribute("data-add");
              b.disabled = true;
              D.friendRequest(id).then(function () {
                b.textContent = "已发送";
                renderFriends();
              }).catch(function (e) { b.disabled = false; alert(e.message || "请求失败"); });
            });
          });
        }).catch(function (e) { el.searchResults.innerHTML = '<div class="empty">搜索失败</div>'; });
      }

      // 打开与某好友的会话（单独拉取聊天内容）
      function openChat(id) {
        var f = (friendsCache || []).filter(function (x) { return x.id === id; })[0];
        if (!f) return;
        activeId = id; activeName = f.name;
        el.chatEmpty.style.display = "none";
        el.chatView.style.display = "flex";
        el.chatAvatarWrap.innerHTML = avatarHtml(f.avatar, f.name);
        el.chatName.textContent = f.name;
        el.chatDot.className = "dot " + (f.online ? "on" : "off");
        el.msgInput.value = "";
        loadMessages();
        // 更新列表高亮
        el.friendList.querySelectorAll(".row").forEach(function (r) {
          r.classList.toggle("active", r.getAttribute("data-id") === id);
        });
      }

      // 拉取消息
      function loadMessages() {
        if (!activeId) return;
        D.messages(activeId).then(function (j) {
          var msgs = j.messages || [];
          if (!msgs.length) {
            el.chatBody.innerHTML = '<div class="empty" style="align-self:center;margin:auto">还没有消息，打个招呼吧 👋</div>';
            return;
          }
          el.chatBody.innerHTML = msgs.map(function (m) {
            var me = (m.from === myId);
            return '<div class="msg ' + (me ? "me" : "them") + '">' +
              '<div class="bubble">' + D.esc(m.text) +
              '<span class="time">' + D.fmt(m.ts) + '</span></div></div>';
          }).join("");
          el.chatBody.scrollTop = el.chatBody.scrollHeight;
        }).catch(function (e) { el.chatBody.innerHTML = '<div class="empty">消息加载失败</div>'; });
      }

      // 发送消息
      function send() {
        var text = (el.msgInput.value || "").trim();
        if (!text || !activeId) return;
        el.sendBtn.disabled = true;
        D.sendMessage(activeId, text).then(function () {
          el.msgInput.value = "";
          loadMessages();
        }).catch(function (e) { alert(e.message || "发送失败"); })
          .then(function () { el.sendBtn.disabled = false; });
      }

      // 移除好友
      function removeFriend() {
        if (!activeId) return;
        if (!confirm("确定移除好友 " + (activeName || "") + " ？")) return;
        D.friendRemove(activeId).then(function () {
          activeId = null; activeName = "";
          el.chatView.style.display = "none";
          el.chatEmpty.style.display = "flex";
          renderFriends();
        }).catch(function (e) { alert(e.message || "移除失败"); });
      }

      // 事件绑定
      el.searchBtn.addEventListener("click", doSearch);
      el.searchInput.addEventListener("keydown", function (e) { if (e.key === "Enter") doSearch(); });
      el.sendBtn.addEventListener("click", send);
      el.msgInput.addEventListener("keydown", function (e) { if (e.key === "Enter") send(); });
      el.removeBtn.addEventListener("click", removeFriend);

      // 首次加载
      renderFriends();

      // 保持自己在线（刷新 me 状态），5 分钟一次，切后台暂停
      function startMePoll() { if (window.__meTimer) clearInterval(window.__meTimer); window.__meTimer = setInterval(function () { D.me().catch(function () {}); }, 300000); D.me().catch(function () {}); }
      function stopMePoll() { if (window.__meTimer) { clearInterval(window.__meTimer); window.__meTimer = null; } }
      document.addEventListener("visibilitychange", function () { if (document.hidden) stopMePoll(); else startMePoll(); });
      startMePoll();

      // 在线刷新：周期性更新好友列表，1 分钟一次，切后台暂停
      function startFriendsPoll() { if (window.__friendsTimer) clearInterval(window.__friendsTimer); window.__friendsTimer = setInterval(function () { renderFriends(); }, 60000); renderFriends(); }
      function stopFriendsPoll() { if (window.__friendsTimer) { clearInterval(window.__friendsTimer); window.__friendsTimer = null; } }
      document.addEventListener("visibilitychange", function () { if (document.hidden) stopFriendsPoll(); else startFriendsPoll(); });
      startFriendsPoll();
    })();
  </script>
<script src="js/checkin.js?v=41"></script>
</body>
</html>
