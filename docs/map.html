<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <title>互动地图 · 三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="description" content="三角洲情报台互动地图 — 多地图切换、缩放拖拽、标点分类筛选、搜索定位">
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="manifest.webmanifest?v=18">
  <link rel="icon" href="icon.svg?v=18">
  <link rel="stylesheet" href="css/style.css?v=18">
</head>
<body>
  <div id="siteAnnounce" class="site-announce"></div>
  <div class="layout">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn menu-toggle" id="menuToggle" title="菜单">☰</button>
        <span class="logo">三角洲<span class="logo-accent">情报台</span></span>
        <span class="brand-en">DeltaIntel</span>
      </div>
      <div class="topbar-right">
        <a class="icon-btn" href="index.html" title="首页">🏠</a>
        <a class="icon-btn" href="forum.html" title="论坛">💬</a>
        <a class="nav-link" href="ugc.html" title="用户投稿">📝 投稿</a>
        <a class="nav-link" href="profile.html" title="我的主页">👤 主页</a>
        <a class="nav-link" href="map.html" title="互动地图">🗺️ 地图</a>
        <button class="icon-btn" id="themeToggle" title="切换明暗">🌓</button>
        <a class="nav-link" id="authBtn" href="forum.html" title="登录 / 注册">🔑 登录/注册</a>
      </div>
    </header>

    <main class="content map-page">
      <div class="map-head">
        <div>
          <h1>互动地图</h1>
          <p class="map-sub">真实三角洲地图 · 可查看物资 · 可讨论 · 登录后可添加标点</p>
        </div>
        <button class="btn sm" id="addModeBtn" title="登录后点击此处，然后在地图上点击即可添加标点">➕ 添加标点</button>
      </div>

      <div class="map-tabs" id="mapTabs"><!-- JS 注入地图切换 --></div>

      <div class="map-body">
        <aside class="map-side">
          <div class="map-search">
            <input id="mapSearch" placeholder="搜索标点或物资（如：保险箱 / 撤离 / 首领）" />
          </div>
          <div class="map-filters" id="mapFilters"><!-- JS 注入分类开关 --></div>
          <div class="map-legend" id="mapLegend">点击标点或列表项查看物资与讨论。</div>
          <div class="map-list" id="mapList"><!-- JS 注入标点列表 --></div>

          <div class="add-marker-form" id="addMarkerForm" style="display:none">
            <div class="amf-head">添加自定义标点</div>
            <label>名称<input id="addMarkerTitle" placeholder="如：行政楼二楼保险箱"></label>
            <label>分类
              <select id="addMarkerCat">
                <option value="loot">物资点</option>
                <option value="spawn">出生点</option>
                <option value="extract">撤离点</option>
                <option value="boss">首领</option>
                <option value="event">事件</option>
              </select>
            </label>
            <label>描述<textarea id="addMarkerDesc" rows="2" placeholder="有什么物资、注意事项"></textarea></label>
            <label>坐标
              <span class="coords"><input id="addMarkerX" readonly> , <input id="addMarkerY" readonly></span>
            </label>
            <div class="amf-loot-title">物资（可多选）</div>
            <div class="amf-loot" id="addMarkerLoot"></div>
            <div class="amf-btns">
              <button class="btn sm" id="addMarkerSubmit">提交</button>
              <button class="btn sm secondary" id="addMarkerCancel">取消</button>
            </div>
          </div>
        </aside>

        <section class="map-stage" id="mapStage">
          <div class="map-layer noimg" id="mapLayer"><!-- 底图 + 标点由 JS 注入 --></div>
          <div class="map-cross"></div>
          <div class="map-controls">
            <button id="zoomIn" title="放大">＋</button>
            <button id="zoomOut" title="缩小">－</button>
            <button id="zoomReset" title="复位">⟳</button>
          </div>
          <div class="map-floors" id="mapFloors"><!-- 分层切换（如有） --></div>
          <div class="map-popup" id="mapPopup" style="display:none">
            <button class="map-popup-close" id="popupClose" title="关闭">×</button>
            <div class="map-popup-cat" id="popupCat"></div>
            <div class="map-popup-title" id="popupTitle"></div>
            <div class="map-popup-desc" id="popupDesc"></div>
            <div class="map-popup-loot" id="popupLoot" style="display:none"></div>
            <div class="map-popup-actions">
              <button class="btn sm" id="popupDiscuss">💬 讨论</button>
              <button class="btn sm danger" id="popupDelete" style="display:none">🗑 删除</button>
            </div>
            <div class="map-popup-comments" id="popupComments" style="display:none"></div>
          </div>
          <div class="map-hint">滚轮缩放 · 拖拽平移 · 点击标点看详情</div>
        </section>
      </div>

      <p class="map-foot">地图底图来自游戏截图。物资、坐标持续由玩家社区补充完善；发现错误或缺标点可点击「添加标点」提交。</p>
    </main>
  </div>

  <script src="js/site-common.js?v=18"></script>
  <script src="js/map.js?v=18"></script>
</body>
</html>
