        '<select id="anColor"><option value="info">蓝(信息)</option><option value="warn">橙(提醒)</option><option value="danger">红(重要)</option><option value="ok">绿(成功)</option></select>' +
        '<label class="fld-label" style="margin:0 8px">有效期至</label><input id="anUntil" type="datetime-local"></div>' +
        '<div class="row"><label><input type="checkbox" id="anActive" checked> 立即启用</label></div>' +
        '<div class="row"><button class="btn role-c" id="anAdd">发布公告</button><span class="msg" id="anMsg"></span></div>' +
        '<h4 style="margin:16px 0 8px">现有公告</h4><div id="anList"><div class="status">加载中…</div></div></div>';
      function load() {
        var list = c.querySelector("#anList");
        wkFetch("/api/admin/announce", { method: "GET" }).then(function (r) { return r.json(); }).then(function (j) {
          if (j.error) { list.innerHTML = '<div class="status" style="color:#ff5b5b">' + esc(j.error) + '</div>'; return; }
          var items = j.items || [];
          if (!items.length) { list.innerHTML = '<div class="status">暂无公告。</div>'; return; }
          list.innerHTML = items.map(function (a) {
            return '<div class="ui-role-row"><div><b>' + esc(a.text) + '</b><br><small style="color:var(--muted)">' + (a.active ? "🟢启用" : "⚪停用") + ' · ' + esc(a.color || "") + (a.until ? (" · 至 " + new Date(a.until).toLocaleString()) : "") + '</small></div>' +
              '<div style="display:flex;gap:6px"><button class="btn sm" data-toggle="' + a.id + '" style="margin:0">' + (a.active ? "停用" : "启用") + '</button><button class="btn danger sm" data-del="' + a.id + '">删</button></div></div>';
          }).join("");
          list.querySelectorAll("[data-toggle]").forEach(function (b) { b.onclick = function () { var id = b.getAttribute("data-toggle"); wkFetch("/api/admin/announce/" + id, { method: "PUT", body: JSON.stringify({ active: !b.textContent.includes("启用") }) }).then(function () { load(); }); }; });
          list.querySelectorAll("[data-del]").forEach(function (b) { b.onclick = function () { var id = b.getAttribute("data-del"); wkFetch("/api/admin/announce/" + id, { method: "DELETE" }).then(function () { load(); }); }; });
        }).catch(function () { list.innerHTML = '<div class="status" style="color:#ff5b5b">加载失败</div>'; });
      }
      c.querySelector("#anAdd").onclick = function () {
        var msg = c.querySelector("#anMsg");
        var text = c.querySelector("#anText").value.trim();
        if (!text) { msg.className = "msg err"; msg.textContent = "请输入公告内容"; return; }
        var until = c.querySelector("#anUntil").value;
        var body = { text: text, color: c.querySelector("#anColor").value, active: c.querySelector("#anActive").checked };
        if (until) body.until = new Date(until).getTime();
        wkFetch("/api/admin/announce", { method: "POST", body: JSON.stringify(body) }).then(function (r) { return r.json(); }).then(function (j) {
          if (j.error) { msg.className = "msg err"; msg.textContent = j.error; return; }
          msg.className = "msg ok"; msg.textContent = "✅ 已发布"; c.querySelector("#anText").value = ""; load();
        }).catch(function () { msg.className = "msg err"; msg.textContent = "发布失败"; });
      };
      load();
    }

    /* ============ 用户投稿审核（Worker KV，需以总管理员登录 Worker） ============ */
    function mountUgc(c) {
      if (adminMode() !== "worker") {
        c.innerHTML = '<div class="status">此功能需在「分管理员·账号」标签页以<b>总管理员</b>身份登录 Worker 后使用。</div>';
        return;
      }
      c.innerHTML = '<div class="panel-card"><h3>📝 用户投稿审核</h3>' +
        '<p class="panel-tip">注册用户提交的攻略/素材投稿在此审核，通过后在前台「用户投稿」页公开。</p>' +
        '<div class="row" style="margin-top:6px"><button class="btn role-c sm" id="ugcAiAll">🤖 用 AI 批量审核全部待审</button><span class="msg" id="ugcAiMsg"></span></div>' +
        '<div id="ugList"><div class="status">加载中…</div></div></div>';
      function load() {
        var list = c.querySelector("#ugList");
        wkFetch("/api/admin/ugc", { method: "GET" }).then(function (r) { return r.json(); }).then(function (j) {
          var items = j.items || [];
          if (!items.length) { list.innerHTML = '<div class="status">暂无投稿。</div>'; return; }
          list.innerHTML = items.map(function (u) {
            var stColor = u.status === "approved" ? "#2ecc71" : (u.status === "rejected" ? "#ff5b5b" : "#ffb300");
            return '<div class="panel-card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between"><b>' + esc(u.title) + '</b><span style="color:' + stColor + '">' + esc(u.status) + '</span></div>' +
              '<div class="panel-tip">作者：' + esc(u.author || "") + ' · 分类：' + esc(u.category || "") + ' · ' + (u.createdAt ? new Date(u.createdAt).toLocaleString() : "") + '</div>' +
              '<div style="white-space:pre-wrap;max-height:160px;overflow:auto">' + esc(u.body || "") + '</div>' +
              '<div class="row" style="margin-top:8px">' +
              (u.status !== "approved" ? '<button class="btn role-c sm" data-approve="' + u.id + '">通过</button>' : '') +
              (u.status !== "rejected" ? '<button class="btn sm" data-reject="' + u.id + '">拒绝</button>' : '') +
              '<button class="btn sm" data-ai="' + u.id + '">🤖 AI</button>' +
              '<button class="btn danger sm" data-del="' + u.id + '">删除</button></div></div>';
          }).join("");
          list.querySelectorAll("[data-approve]").forEach(function (b) { b.onclick = function () { wkFetch("/api/admin/ugc/" + b.getAttribute("data-approve"), { method: "PUT", body: JSON.stringify({ status: "approved" }) }).then(function () { load(); }); }; });
          list.querySelectorAll("[data-reject]").forEach(function (b) { b.onclick = function () { wkFetch("/api/admin/ugc/" + b.getAttribute("data-reject"), { method: "PUT", body: JSON.stringify({ status: "rejected" }) }).then(function () { load(); }); }; });
          list.querySelectorAll("[data-del]").forEach(function (b) { b.onclick = function () { wkFetch("/api/admin/ugc/" + b.getAttribute("data-del"), { method: "DELETE" }).then(function () { load(); }); }; });
          var aiAll = c.querySelector("#ugcAiAll");
          if (aiAll) aiAll.onclick = function () {
            var msg = c.querySelector("#ugcAiMsg");
            msg.textContent = "AI 审核中…"; msg.className = "msg";
            wkFetch("/api/admin/ugc/aimod", { method: "POST", body: JSON.stringify({ all: true }) })
              .then(function (r) { return r.json(); }).then(function (j) {
                if (j.error) { msg.className = "msg err"; msg.textContent = "❌ " + j.error; return; }
                msg.className = "msg ok";
                msg.textContent = "✅ 已处理 " + (j.processed || 0) + " 条（approve/reject 直接生效，review 仍转人工）";
                load();
              }).catch(function () { msg.className = "msg err"; msg.textContent = "❌ 调用失败"; });
          };
          list.querySelectorAll("[data-ai]").forEach(function (b) {
            b.onclick = function () {
              wkFetch("/api/admin/ugc/aimod", { method: "POST", body: JSON.stringify({ id: b.getAttribute("data-ai") }) })
                .then(function (r) { return r.json(); }).then(function () { load(); }).catch(function () {});
            };
          });
        }).catch(function () { list.innerHTML = '<div class="status" style="color:#ff5b5b">加载失败</div>'; });
      }
      load();
    }

    /* ============ 网站更新内容（总管理员编辑，前台「网站更新速览」读取） ============ */
    function mountChangelog(c) {
      c.innerHTML = '<div class="panel-card"><h3>📜 网站更新内容 <span class="tag">总管理员</span></h3>' +
        '<p class="panel-tip">编辑前台「网站更新速览」展示的内容。每条含日期、标题与要点（每行一条）。保存后前台即时更新。</p>' +
        '<div id="clList"></div>' +
        '<div class="row"><button class="btn role-c sm" id="clAdd">＋ 添加一条更新</button></div>' +
        '<div class="row"><button class="btn role-c" id="clSave">保存更新内容</button><span class="msg" id="clMsg"></span></div></div>';
      var list = [];
      function renderList() {
        var el = c.querySelector("#clList");
        if (!list.length) { el.innerHTML = '<div class="status">暂无，点“添加一条更新”。</div>'; return; }
        el.innerHTML = list.map(function (e, i) {
          return '<div class="cl-row">' +
            '<div class="row"><input class="cl-date" value="' + esc(e.date || "") + '" placeholder="日期 2026-07-11"> <input class="cl-title" value="' + esc(e.title || "") + '" placeholder="标题"></div>' +
            '<div class="row"><textarea class="cl-items" rows="3" placeholder="要点，每行一条">' + esc((e.items || []).join("\n")) + '</textarea></div>' +
            '<div class="row"><button class="btn danger sm cl-del" data-i="' + i + '">删除</button></div></div>';
        }).join("");
        el.querySelectorAll(".cl-del").forEach(function (b) { b.onclick = function () { list.splice(+b.getAttribute("data-i"), 1); renderList(); }; });
      }
      getDataObj().then(function (d) {
        list = (d.obj.changelog || []).slice();
        if (!list.length) list = [{ date: new Date().toISOString().slice(0, 10), title: "", items: [] }];
        renderList();
      }).catch(function () {});
      c.querySelector("#clAdd").onclick = function () { list.unshift({ date: new Date().toISOString().slice(0, 10), title: "", items: [] }); renderList(); };
      c.querySelector("#clSave").onclick = function () {
        var msg = c.querySelector("#clMsg");
        var collected = [];
        c.querySelectorAll("#clList .cl-row").forEach(function (row) {
          var items = row.querySelector(".cl-items").value.split("\n").map(function (s) { return s.trim(); }).filter(Boolean);
          var date = row.querySelector(".cl-date").value.trim();
          var title = row.querySelector(".cl-title").value.trim();
          if (date || title) collected.push({ date: date, title: title, items: items });
        });
        getDataObj().then(function (d) {
          d.obj.changelog = collected;
          return putDataObj(d.obj, "更新网站更新内容（" + collected.length + " 条）", msg);
        }).catch(function (e) { msg.className = "msg err"; msg.textContent = "❌ " + e.message; });
      };
    }

    function mountFeedback(c) {
      c.innerHTML =
        '<div class="panel-card"><h3>💬 网站反馈设置</h3>' +
        '<p class="panel-tip">前台「网站反馈」页集中收集反馈。可同时启用邮箱与第三方表单。</p>' +
        '<div class="field"><label>反馈邮箱（mailto 接收）</label><input id="fbEmail" placeholder="如 delta.intel.feedback@example.com"></div>' +
        '<div class="field"><label>邮件主题（预填）</label><input id="fbSubject" placeholder="三角洲情报台·网站反馈"></div>' +
        '<div class="field"><label>第三方表单链接（点击跳转）</label><input id="fbFormUrl" placeholder="https://...表单地址"></div>' +
        '<div class="field"><label>第三方表单嵌入地址（iframe，优先于链接）</label><input id="fbFormEmbed" placeholder="https://.../embed"></div>' +
        '<div class="field"><label>GitHub Issue 模板链接（可选）</label><input id="fbGithub" placeholder="https://github.com/.../issues/new"></div>' +
        '<div class="row"><button class="btn role-c" id="fbSave">保存反馈设置</button><span class="msg" id="fbMsg"></span></div></div>';
      getDataObj().then(function (d) {
        var f = d.obj.feedback || {};
        c.querySelector('#fbEmail').value = f.email || '';
        c.querySelector('#fbSubject').value = f.mailSubject || '';
        c.querySelector('#fbFormUrl').value = f.formUrl || '';
        c.querySelector('#fbFormEmbed').value = f.formEmbed || '';
        c.querySelector('#fbGithub').value = f.github || '';
      }).catch(function () {});
      c.querySelector('#fbSave').onclick = function () {
        var msg = c.querySelector('#fbMsg');
        getDataObj().then(function (d) {
          d.obj.feedback = {
            email: c.querySelector('#fbEmail').value.trim(),
            mailSubject: c.querySelector('#fbSubject').value.trim() || '三角洲情报台·网站反馈',
            formUrl: c.querySelector('#fbFormUrl').value.trim(),
            formEmbed: c.querySelector('#fbFormEmbed').value.trim(),
            github: c.querySelector('#fbGithub').value.trim()
          };
          return putDataObj(d.obj, '更新反馈设置', msg);
        }).catch(function (e) { msg.className = 'msg err'; msg.textContent = '❌ ' + e.message; });
      };
    }

    /* ============ 图片库管理（美术管理员） ============ */
    function mountImages(c) {
      c.innerHTML =
        '<div class="panel-card"><h3>🖼 图片库</h3>' +
        '<p class="panel-tip">① 选文件上传 JPG/PNG（自动转站内数据，保存后前台可用）；② 或在代码框粘贴图片 URL / Base64 / &lt;img&gt; 代码。</p>' +
        '<div class="row"><input id="imgName" placeholder="图片名称，如：红狼立绘" style="flex:1">' +
        '<select id="imgUsed" style="flex:1"><option value="">用途（选填）</option><option>干员头像</option><option>武器图</option><option>轮播图</option><option>小知识封面</option><option>站点素材</option></select></div>' +
        '<div class="row"><input type="file" id="imgFile" accept="image/*"></div>' +
        '<div class="row"><textarea id="imgCode" rows="2" placeholder="或粘贴图片 URL / Base64 / <img> 代码"></textarea></div>' +
        '<div class="row"><button class="btn role-c" id="imgAdd">添加图片到库</button><span class="msg" id="imgMsg"></span></div>' +
        '<div class="img-grid" id="imgGrid"><div class="status">加载中…</div></div></div>';
      function extractSrc(code) { var m = code.match(/src=["']([^"']+)["']/i); return m ? m[1] : code.trim(); }
      function renderGrid(list) {
        var grid = c.querySelector('#imgGrid');
        if (!list.length) { grid.innerHTML = '<div class="status">图片库为空，上传或粘贴一张试试。</div>'; return; }
        grid.innerHTML = list.map(function (im, i) {
          var src = im.src || '';
          return '<div class="img-card" data-i="' + i + '">' +
            '<div class="img-thumb" style="background:url(' + esc(src) + ') center/cover"></div>' +
            '<div class="img-name">' + esc(im.name || '未命名') + '</div>' +
            (im.usedIn ? '<div class="img-used">' + esc(im.usedIn) + '</div>' : '') +
            '<button class="btn danger sm img-del">删除</button></div>';
        }).join('');
        grid.querySelectorAll('.img-del').forEach(function (b) {
          b.onclick = function () {
            if (!confirm('确定删除该图片？')) return;
            var i = +b.closest('.img-card').getAttribute('data-i');
            getDataObj().then(function (d) {
              d.obj.images = d.obj.images || { images: [] };
              d.obj.images.images.splice(i, 1);
              return putDataObj(d.obj, '删除图片', c.querySelector('#imgMsg')).then(function () { loadGrid(); });
            }).catch(function (e) { var m = c.querySelector('#imgMsg'); m.className = 'msg err'; m.textContent = '❌ ' + e.message; });
          };
        });
      }
      function loadGrid() {
        getDataObj().then(function (d) {
          renderGrid((d.obj.images && d.obj.images.images) || []);
        }).catch(function () { c.querySelector('#imgGrid').innerHTML = '<div class="status" style="color:#ff5b5b">加载失败</div>'; });
      }
      c.querySelector('#imgAdd').onclick = function () {
        var msg = c.querySelector('#imgMsg');
        var name = c.querySelector('#imgName').value.trim();
        var used = c.querySelector('#imgUsed').value;
        var code = c.querySelector('#imgCode').value.trim();
        var fileEl = c.querySelector('#imgFile');
        function pushRef(src) {
          if (!name && !src) { msg.className = 'msg err'; msg.textContent = '请填名称或提供图片'; return; }
          getDataObj().then(function (d) {
            d.obj.images = d.obj.images || { images: [] };
            d.obj.images.images.push({ name: name || '未命名', src: src, usedIn: used });
            return putDataObj(d.obj, '添加图片：' + (name || ''), msg).then(function () {
              c.querySelector('#imgName').value = ''; c.querySelector('#imgCode').value = ''; c.querySelector('#imgFile').value = ''; loadGrid();
            });
          }).catch(function (e) { msg.className = 'msg err'; msg.textContent = '❌ ' + e.message; });
        }
        if (fileEl.files && fileEl.files[0]) {
          var file = fileEl.files[0];
          var reader = new FileReader();
          reader.onload = function () {
            var b64 = reader.result.split(',')[1];
            var safe = (name || file.name || 'image').replace(/[^\w\u4e00-\u9fa5.\-]/g, '_');
            var ext = /png/i.test(file.type) ? 'png' : (/jpe?g/i.test(file.type) ? 'jpg' : (/gif/i.test(file.type) ? 'gif' : 'png'));
            var path = 'docs/assets/img/' + Date.now() + '_' + safe + '.' + ext;
            putFile(path, b64, '上传图片：' + (name || file.name), msg)
              .then(function (url) { if (!url) throw new Error('未获取到图片地址'); pushRef(url); })
              .catch(function (e) { msg.className = 'msg err'; msg.textContent = '❌ ' + e.message; });
          };
          reader.readAsDataURL(file);
        } else if (code) { pushRef(extractSrc(code)); }
        else { msg.className = 'msg err'; msg.textContent = '请选择文件或粘贴图片代码'; }
      };
      loadGrid();
    }

    /* 暴露给开发工作台插件 */
    window.__admin = {
      getDataObj: getDataObj,
      putDataObj: putDataObj,
      putFile: putFile,
      adminMode: adminMode,
      headers: headers,
      wkFetch: wkFetch,
      b64utf8: b64utf8,
      REPO: typeof REPO !== "undefined" ? REPO : "",
      API: typeof API !== "undefined" ? API : "",
      activeRole: function () { return activeRole; }
    };

    /* ===== 启动 ===== */
    renderRolePicker();
  })();
  </script>
</body>
</html>
