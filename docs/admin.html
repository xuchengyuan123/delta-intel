<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <title>管理后台 · 三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <link rel="stylesheet" href="css/style.css?v=47">
  <!-- 美术管理员实时预览需要内置建筑线描 -->
  <script src="js/art.js?v=47"></script>
  <script defer src="js/i18n.js?v=47"></script>
  <script defer src="js/workbench.js?v=47"></script>
  <style>
    :root { --role: #ffb300; }
    body { background: var(--bg); }
    .admin-shell { display: none; }
    .admin-shell.on { display: block; }

    /* 登录页 */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
      background: radial-gradient(1200px 600px at 70% -10%, color-mix(in srgb, var(--accent) 18%, transparent), transparent), var(--bg); }
    .login-card { width: min(440px, 94vw); background: var(--bg-elev); border: 1px solid var(--border); border-radius: 18px; padding: 30px; box-shadow: var(--shadow); }
    .login-card .lg-logo { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .login-card .lg-logo span { color: var(--accent); }
    .login-card .lg-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.7; }
    .login-field { margin-bottom: 16px; }
    .sa-form { max-width: 440px; }
    .login-field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .login-field input, .login-field select { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px; box-sizing: border-box; }
    .login-roles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .login-role { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; background: var(--bg-soft); font-size: 13px; }
    .login-role input { accent-color: var(--accent); }
    .login-role .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .login-role.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--bg-soft)); }
    .sa-presets { display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 10px; }
    .sa-preset { background:var(--bg-soft); border:1px solid var(--border); border-radius:999px; padding:5px 11px; font-size:12px; cursor:pointer; color:var(--text); }
    .sa-preset:hover { border-color:var(--accent); }
    .sa-panels { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:6px 10px; max-height:240px; overflow:auto; padding:8px; border:1px solid var(--border); border-radius:10px; background:var(--bg-soft); }
    .sa-panel { display:flex; align-items:center; gap:6px; font-size:12.5px; cursor:pointer; }
    .sa-panel input { accent-color:var(--accent); }
    .login-err { color: #ff5b5b; font-size: 13px; min-height: 18px; margin: 6px 0; }
    .lg-tabs { display:flex; gap:8px; margin-bottom:14px; }
    .lg-tabs .tab { flex:1; background:transparent; border:1px solid var(--border); color:var(--muted); padding:8px; border-radius:10px; cursor:pointer; font-size:13px; }
    .lg-tabs .tab.active { background:var(--accent); color:#1a1a1a; border-color:var(--accent); font-weight:700; }
    .lg-pane { display:none; }
    .lg-pane.active { display:block; }
    .lg-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .lg-row input { flex:1; min-width:120px; }
    .lg-hint { color: var(--muted); font-size: 12px; margin-top: 10px; line-height: 1.5; }

    /* 后台布局 */
    .admin-top { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px;
      background: var(--topbar); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30; }
    .admin-top .at-left { display: flex; align-items: center; gap: 12px; }
    .admin-top .at-logo { font-weight: 800; font-size: 16px; }
    .admin-top .at-logo span { color: var(--accent); }
    .role-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: #1a1a1a;
      padding: 4px 10px; border-radius: 999px; background: var(--role); }
    .role-switch { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 8px; font-size: 12px; }
    .admin-top .at-right { display: flex; align-items: center; gap: 10px; }
    .admin-top .who { font-size: 13px; color: var(--muted); }
    .admin-body { display: grid; grid-template-columns: 230px 1fr; min-height: calc(100vh - 56px); }
    .admin-side { background: var(--sidebar); border-right: 1px solid var(--border); padding: 12px 0; overflow-y: auto; }
    .as-group { padding: 14px 16px 6px; font-size: 11px; letter-spacing: 1px; color: var(--muted); }
    .as-group.as-static { cursor: default; }
    .as-group:not(.as-static) { cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
    .as-group:not(.as-static):hover { color: var(--text); }
    .as-group .as-arrow { font-size: 10px; opacity: .6; transition: transform .15s ease; }
    .as-group.collapsed .as-arrow { transform: rotate(-90deg); }
    .as-group.collapsed + .as-group-body { display: none; }
    #sideRecent .as-item { background: color-mix(in srgb, var(--role) 8%, transparent); }
    .as-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; color: var(--text); border-left: 3px solid transparent; user-select: none; }
    .as-item:hover { background: var(--bg-soft); }
    .as-item.active { background: color-mix(in srgb, var(--role) 14%, transparent); border-left-color: var(--role); color: var(--role); font-weight: 700; }
    .as-item .ico { width: 18px; text-align: center; }
    .side-search { width: calc(100% - 24px); margin: 10px 12px 4px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); font-size: 13px; box-sizing: border-box; outline: none; }
    .side-search:focus { border-color: var(--role); }
    .as-empty { padding: 14px 16px; color: var(--muted); font-size: 13px; }
    .admin-main { padding: 20px; max-width: 1100px; }
    .admin-main h2.am-title { margin: 0 0 4px; font-size: 20px; }
    .admin-main .am-sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

    /* 通用按钮 */
    .btn { background: var(--accent); color: #1a1a1a; border: 0; border-radius: 9px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn:hover { filter: brightness(1.06); }
    .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); font-weight: 600; }
    .btn.sm { padding: 6px 12px; font-size: 12px; }
    .btn.danger { background: #d9534f; color: #fff; }
    .btn.role-c { background: var(--role); }
    .msg { font-size: 13px; } .msg.ok { color: #2ecc71; } .msg.err { color: #ff5b5b; }

    .panel-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .panel-card h3 { margin: 0 0 10px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .panel-card h3 .tag { font-size: 11px; font-weight: 700; color: #1a1a1a; background: var(--role); padding: 2px 8px; border-radius: 6px; }
    .panel-tip { color: var(--muted); font-size: 13px; margin: 0 0 12px; line-height: 1.7; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field label { font-size: 13px; color: var(--muted); }
    .field input, .field textarea, .field select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 9px 11px; font-size: 13px; box-sizing: border-box; width: 100%; font-family: inherit; }
    .field textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .row input, .row textarea { width: 100%; box-sizing: border-box; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 8px; font-size: 13px; }
    .fld-label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 2px; }
    .hr { border: 0; border-top: 1px dashed var(--border); margin: 16px 0; }
    .status { color: var(--muted); font-size: 13px; padding: 18px; text-align: center; }
    /* 错误卡片（友好报错 + 重试） */
    .err-card { display: flex; gap: 14px; align-items: flex-start; background: var(--bg-elev); border: 1px solid #ff5b5b55; border-radius: 12px; padding: 18px; box-shadow: var(--shadow); }
    .err-card .err-ico { font-size: 30px; line-height: 1; flex: 0 0 auto; }
    .err-card .err-body { flex: 1 1 auto; min-width: 0; }
    .err-card .err-title { font-size: 15px; font-weight: 700; color: #ff7b7b; margin-bottom: 4px; }
    .err-card .err-detail { font-size: 13px; color: var(--text); line-height: 1.7; opacity: .92; }
    .err-card .err-retry { margin-top: 12px; }
    .err-card .err-retry::before { content: "🔄 "; }
    @media (max-width: 480px) { .err-card { flex-direction: column; gap: 10px; } }
    .editor { width: 100%; min-height: 340px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 11px; font-size: 13px; font-family: ui-monospace, Menlo, Consolas, monospace; box-sizing: border-box; line-height: 1.5; resize: vertical; }

    /* 仪表盘 KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .kpi-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
    .kpi-card .n { font-size: 28px; font-weight: 800; color: var(--role); }
    .kpi-card .l { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .dash-jump { display: flex; gap: 10px; flex-wrap: wrap; }
    .dash-jump .btn { flex: 1; min-width: 130px; }

    /* 日志表 */
    table.log { width: 100%; border-collapse: collapse; }
    table.log th, table.log td { padding: 9px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    table.log th { color: var(--muted); font-weight: 600; font-size: 12px; }
    .role-pill { font-size: 11px; font-weight: 700; color: #1a1a1a; padding: 2px 8px; border-radius: 999px; }

    /* 音乐 / 武器 / 护甲 行编辑 */
    .item-table { width: 100%; border-collapse: collapse; }
    .item-table th, .item-table td { padding: 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .item-table th { color: var(--muted); font-weight: 600; font-size: 12px; text-align: left; }
    .item-table input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 7px 8px; font-size: 13px; box-sizing: border-box; }
    .item-table .col-min { width: 64px; } .item-table .col-act { width: 70px; }

    /* 美术编辑器 */
    .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .art-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 14px; box-shadow: var(--shadow); }
    .art-card .ac-name { font-weight: 700; font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .art-preview { border: 1px dashed var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; background: var(--bg-soft); }
    .art-card textarea { width: 100%; min-height: 90px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px; font-size: 12px; font-family: ui-monospace, monospace; box-sizing: border-box; resize: vertical; }
    .art-card .ac-row { display: flex; gap: 8px; margin-top: 8px; }
    .accent-row { display: flex; align-items: center; gap: 12px; margin: 6px 0 14px; }
    .accent-row input[type=color] { width: 54px; height: 38px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; }
    .accent-row code { background: var(--bg-soft); padding: 3px 8px; border-radius: 6px; color: var(--muted); font-size: 12px; }

    /* 界面定制：各角色配色网格 */
    .ui-role-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .ui-role-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-soft); }
    .ui-role-row .ui-role-name { flex: 1; font-size: 13px; font-weight: 600; }
    .ui-role-row input[type=color] { width: 44px; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; }
    .ui-role-row code { font-size: 12px; color: var(--muted); }
    .ui-role-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn.role-d { background: #ff5b5b; color: #fff; }

    /* ===== 用户管理面板（V48 重构：更清晰的工具栏 + 统计 + 筛选 + 卡片） ===== */
    .um-toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:12px; }
    .um-search { flex:1; min-width:180px; position:relative; display:flex; align-items:center; }
    .um-search input { width:100%; box-sizing:border-box; padding:9px 12px 9px 34px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:13px; }
    .um-search .ic { position:absolute; left:11px; font-size:13px; opacity:.6; pointer-events:none; }
    .um-stats { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .um-stat { flex:1; min-width:92px; padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:var(--bg-soft); }
    .um-stat .n { font-size:20px; font-weight:800; line-height:1.1; }
    .um-stat .l { font-size:11.5px; color:var(--muted); margin-top:2px; }
    .um-stat.total .n { color:var(--accent); }
    .um-stat.dis .n { color:#ff5b5b; }
    .um-stat.tru .n { color:#19c3a6; }
    .um-filters { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .um-chip { padding:5px 12px; border:1px solid var(--border); border-radius:999px; background:var(--bg); color:var(--muted); font-size:12px; cursor:pointer; user-select:none; transition:.15s; }
    .um-chip:hover { border-color:var(--accent); color:var(--text); }
    .um-chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
    .um-list { display:flex; flex-direction:column; gap:8px; }
    .um-card { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--border); border-radius:12px; background:var(--bg-soft); transition:.15s; }
    .um-card:hover { border-color:var(--accent); box-shadow:0 2px 12px rgba(0,0,0,.12); }
    .um-card.is-disabled { opacity:.62; }
    .um-ava { width:42px; height:42px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; color:#fff; text-transform:uppercase; }
    .um-main { flex:1; min-width:0; }
    .um-name { font-size:14px; font-weight:700; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .um-meta { font-size:12px; color:var(--muted); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .um-tag { font-size:11px; padding:1px 8px; border-radius:999px; font-weight:600; }
    .um-tag.dis { background:rgba(255,91,91,.15); color:#ff5b5b; }
    .um-tag.tru { background:rgba(25,195,166,.15); color:#19c3a6; }
    .um-acts { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
    .um-acts .btn { padding:5px 10px; font-size:12px; }
    .um-empty, .um-error { text-align:center; padding:34px 16px; color:var(--muted); border:1px dashed var(--border); border-radius:12px; line-height:1.7; }
    .um-empty .ico, .um-error .ico { font-size:30px; display:block; margin-bottom:8px; }
    .um-empty .hint { font-size:12px; margin-top:8px; }
    .um-error { color:#ff5b5b; border-color:rgba(255,91,91,.4); }
    .um-skel { height:66px; border-radius:12px; background:linear-gradient(90deg,var(--bg-soft) 25%,var(--border) 37%,var(--bg-soft) 63%); background-size:400% 100%; animation:umsk 1.3s ease infinite; margin-bottom:8px; }
    @keyframes umsk { 0%{background-position:100% 0} 100%{background-position:0 0} }
    .um-detail { margin-top:12px; border:1px solid var(--accent); border-radius:12px; padding:14px 16px; background:var(--bg-soft); }
    .um-detail h4 { margin:0 0 10px; font-size:15px; display:flex; justify-content:space-between; align-items:center; }
    .um-detail .kv { display:grid; grid-template-columns:96px 1fr; gap:7px 10px; font-size:13px; }
    .um-detail .kv b { color:var(--muted); font-weight:600; }
    @media (max-width:640px){ .um-card{flex-wrap:wrap} .um-acts{width:100%;justify-content:flex-start;margin-top:6px} }

    .post { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
    .post .pmeta { display: flex; gap: 10px; align-items: baseline; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .post .pauthor { color: var(--accent); font-weight: 600; }
    .post .ptitle { font-size: 16px; font-weight: 700; margin: 0 0 6px; }
    .post .pbody { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }

    /* 设备管理面板 */
    .dev-tools { margin-bottom: 10px; }
    .dev-list { display: flex; flex-direction: column; gap: 8px; }
    .dev-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-soft); }
    .dev-info { flex: 1; min-width: 0; }
    .dev-name { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dev-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .dev-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--border); color: var(--muted); }
    .dev-badge.cur { background: color-mix(in srgb, #3ddc84 22%, transparent); color: #3ddc84; }
    .dev-empty { color: var(--muted); font-size: 13px; padding: 8px 0; }

    /* 汉堡菜单按钮（仅移动端显示） + 遮罩 */
    .nav-toggle { display: none; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 18px; cursor: pointer; line-height: 1; }
    .nav-mask { display: none; }

    /* ===== 移动端自适应：抽屉式侧边栏，手机竖屏/横屏/缩放均可用 ===== */
    @media (max-width: 860px) {
      .nav-toggle { display: inline-block; }
      .admin-body { grid-template-columns: 1fr; position: relative; }
      .admin-side {
        position: fixed; top: 56px; left: 0; bottom: 0; width: 240px; max-width: 82vw;
        transform: translateX(-100%); transition: transform .22s ease; z-index: 40;
        box-shadow: var(--shadow); display: block;
      }
      .admin-body.nav-open .admin-side { transform: translateX(0); }
      .admin-body.nav-open .nav-mask { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 35; }
      .admin-main { padding: 14px; max-width: 100%; }
      .admin-top .who { display: none; }
      .login-roles { grid-template-columns: 1fr; }
      .panel-card { padding: 14px; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
      .row { gap: 8px; }
    }
    @media (max-width: 480px) {
      .admin-top { padding: 0 10px; height: 52px; }
      .admin-side { top: 52px; }
      .at-logo { font-size: 14px; }
      .admin-main { padding: 10px; }
      .am-title { font-size: 18px; }
      .role-switch { max-width: 120px; }
      .admin-top .at-right .btn { padding: 6px 10px; }
    }
    @media (orientation: landscape) and (max-height: 520px) {
      .admin-top { height: 48px; }
      .admin-side { top: 48px; }
      .admin-main { padding: 10px 14px; }
    }

    /* ===== 资讯管理编辑器（可视化增删改） ===== */
    .news-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .news-tabs .nt { padding: 7px 14px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg); color: var(--muted); font-size: 13px; cursor: pointer; user-select: none; transition: .15s; }
    .news-tabs .nt:hover { border-color: var(--accent); color: var(--text); }
    .news-tabs .nt.on { background: var(--accent); border-color: var(--accent); color: #1a1a1a; font-weight: 700; }
    .ne-list { display: flex; flex-direction: column; gap: 12px; }
    .ne-card { border: 1px solid var(--border); border-radius: 14px; background: var(--bg-soft); padding: 14px; }
    .ne-card .ne-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ne-card .ne-idx { width: 26px; height: 26px; flex: none; border-radius: 50%; background: var(--accent); color: #1a1a1a; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .ne-card .ne-title { flex: 1; font-weight: 700; font-size: 14px; }
    .ne-card .ne-del { flex: none; }
    .ne-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .ne-field { display: flex; flex-direction: column; gap: 4px; }
    .ne-field label { font-size: 12px; color: var(--muted); }
    .ne-field input, .ne-field textarea, .ne-field select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 8px 10px; font-size: 13px; box-sizing: border-box; width: 100%; font-family: inherit; }
    .ne-field textarea { min-height: 64px; resize: vertical; line-height: 1.5; }
    .ne-field.invalid input { border-color: #ff5b5b; }
    .ne-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(255,91,91,.15); color: #ff5b5b; font-weight: 600; }
    .ne-badge.ok { background: rgba(46,204,113,.15); color: #2ecc71; }
    .ne-add { margin-bottom: 14px; }
    .ne-foot { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
    .ne-count { font-size: 12px; color: var(--muted); }

    /* ===== 浏览记录图表 ===== */
    .chart-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .chart-card h3 { margin: 0 0 6px; font-size: 15px; }
    .chart-card .cc-sub { color: var(--muted); font-size: 12px; margin: 0 0 12px; }
    .hbar-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; margin-bottom: 7px; }
    .hbar-row .lbl { width: 130px; flex: none; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hbar-row .track { flex: 1; background: var(--bg-soft); border-radius: 6px; height: 18px; overflow: hidden; }
    .hbar-row .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--role)); border-radius: 6px; min-width: 2px; }
    .hbar-row .val { width: 48px; flex: none; text-align: right; font-weight: 700; }
    .chart-svg { width: 100%; height: auto; display: block; }
    .chart-empty { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
    @media (max-width: 480px) { .hbar-row .lbl { width: 92px; font-size: 11.5px; } }
  </style>

    /* ===== 工具 ===== */
    function getToken() { try { return localStorage.getItem(KEY_TOKEN) || ""; } catch (e) { return ""; } }

    function apiBase() {
      var ls = "";

      return (ls || window.DELTA_API || DELTA_API || "").replace(/\/$/, "");

    function adminMode() { return getWorkerSession() ? "worker" : (getToken() ? "token" : ""); }
    function wkFetch(path, opts) {
      opts = opts || {};
      opts.headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
      if (getWorkerSession()) opts.headers["Authorization"] = "Bearer " + getWorkerSession();
      return fetch(apiBase() + path, opts);
    }
    function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
    /* 把底层报错翻译成中文友好提示 */
    function friendlyMsg(err) {
      var msg = (err && err.message) ? String(err.message) : "未知错误";
      if (/Failed to fetch|NetworkError|网络|timeout|超时|abort/i.test(msg)) {
        return { title: "无法连接后端服务", detail: "请检查网络是否通畅，并确认后端地址 api.delta.shopping 可正常访问。若使用了代理 / VPN，请临时关闭后重试。" };
      }
      if (/401|403|未授权|无权限|登录失效|token|会话/i.test(msg)) {
        return { title: "登录已失效或没有权限", detail: "请点击右上角「退出」，然后重新以总管理员身份登录后再试。" };
      }
      if (/404|GitHub 读取失败|Not Found|找不到|不存在/i.test(msg)) {
        return { title: "数据文件读取失败（404）", detail: "后端找不到 data.json。请确认：① Worker 的 GitHub 仓库配置（REPO / 分支）填写正确；② 上传包已上传到 Pages 仓库根目录（含 data.json）。重新部署 Worker 后通常需要等待 1-2 分钟生效。" };
      }
      if (/500|502|503|504|服务器错误|Server Error|Internal|Bad Gateway/i.test(msg)) {
        return { title: "后端服务暂时异常", detail: "Cloudflare Worker 返回了服务器错误。请稍等片刻后点「重试」，或到 Cloudflare 控制台查看 Worker 运行日志。" };
      }
      if (/repo 权限|GitHub|gh_|commit/i.test(msg)) {
        return { title: "GitHub 数据读写失败", detail: "Worker 在向 GitHub 写入时出错。请确认 GH_TOKEN 拥有该仓库的 repo 权限，且仓库名 / 分支填写正确。" };
      }
      return { title: "加载失败", detail: msg };
    }
    /* 在容器 c 内渲染友好错误卡片，并绑定重试按钮 */
    function showErr(c, err, retryFn) {
      if (!c) return;
      var m = friendlyMsg(err);
      c.innerHTML = '<div class="err-card"><div class="err-ico">⚠️</div>' +
        '<div class="err-body"><div class="err-title">' + esc(m.title) + '</div>' +
        '<div class="err-detail">' + esc(m.detail) + '</div>' +
        '<button class="btn err-retry" type="button">重试</button></div></div>';
      var btn = c.querySelector(".err-retry");
      if (btn) btn.onclick = function () { if (retryFn) retryFn(); };
    }
    /* 通用 SVG 柱状图（纯矢量，无外部依赖，自适应宽度）。pairs: [[label,value],...] 升序 */
    function svgBars(pairs) {
      if (!pairs || !pairs.length) return '<div class="chart-empty">暂无数据</div>';
      var W = 680, padL = 6, padR = 6, padT = 10, padB = 22, H = 210;
      var max = 1;
      pairs.forEach(function (p) { if (p[1] > max) max = p[1]; });
      var n = pairs.length;
      var innerW = W - padL - padR, innerH = H - padT - padB;
      var gap = n > 1 ? Math.min(10, innerW / n * 0.35) : 0;
      var bw = (innerW - gap * (n - 1)) / n;
      var bars = "", labels = "";
      var step = Math.max(1, Math.ceil(n / 9));
      pairs.forEach(function (p, i) {
        var v = p[1] || 0;
        var h = Math.round(innerH * v / max);
        var x = padL + i * (bw + gap);
        var y = padT + (innerH - h);
        bars += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + Math.max(1, bw).toFixed(1) + '" height="' + Math.max(0, h).toFixed(1) + '" rx="2" fill="var(--accent)"><title>' + esc(p[0]) + '：' + v + '</title></rect>';
        if (i % step === 0 || i === n - 1) {
          var lx = x + bw / 2;
          labels += '<text x="' + lx.toFixed(1) + '" y="' + (H - 6) + '" font-size="9" fill="var(--muted)" text-anchor="middle">' + esc(String(p[0]).slice(5)) + '</text>';
        }
      });
      return '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="访问趋势图">' + bars + labels + '</svg>';
    }
    /* 通用横向条形（排行榜）。items: [{label,value}] */
    function hBars(items, maxVal) {
      if (!items || !items.length) return '<div class="chart-empty">暂无数据</div>';
      var mx = maxVal || 1;
      return items.map(function (it) {
        var pct = Math.max(2, Math.round(it.value / mx * 100));
        return '<div class="hbar-row"><div class="lbl" title="' + esc(it.label) + '">' + esc(it.label) + '</div>' +
          '<div class="track"><div class="fill" style="width:' + pct + '%"></div></div>' +
          '<div class="val">' + it.value + '</div></div>';
      }).join("");
    }
    function b64utf8(str) { return btoa(unescape(encodeURIComponent(str))); }
    function headers(auth) {
      var h = { "Accept": "application/vnd.github+json", "Content-Type": "application/json" };
      if (auth) { var t = getToken(); if (t) h["Authorization"] = "Bearer " + t; }
      return h;
    }
    function nowStr() {
      var d = new Date(); var p = function (x) { return String(x).padStart(2, "0"); };
      return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes());
    }

    /* ===== data.json 读写 + 操作日志 ===== */
    function getDataObj() {
      if (adminMode() === "worker") {
        return wkFetch("/api/admin/data").then(function (r) { return r.json(); }).then(function (j) {
          if (j.error) throw new Error(j.error);
          return { obj: JSON.parse(j.content) };
        });
      }
      return fetch(API + "/repos/" + REPO + "/contents/docs/data.json", { headers: headers(true) })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (j) { dataSha = j.sha; return { obj: JSON.parse(decodeURIComponent(escape(atob(j.content)))), sha: j.sha }; });
    }
    function getLatestSha() {
      if (adminMode() === "worker") return Promise.resolve("");
      return fetch(API + "/repos/" + REPO + "/contents/docs/data.json", { headers: headers(true) })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (j) { dataSha = j.sha; return j.sha; });
    }
    function putDataObj(obj, actionDesc, msgEl) {
      if (msgEl) { msgEl.className = "msg"; msgEl.textContent = "保存中…"; }
      // 写入操作日志
      obj.adminLog = obj.adminLog || [];
      obj.adminLog.unshift({ time: nowStr(), role: currentRoleName(), action: actionDesc || "更新数据" });
      obj.adminLog = obj.adminLog.slice(0, 120);

      if (adminMode() === "worker") {
        return wkFetch("/api/admin/data", { method: "PUT", body: JSON.stringify({ content: JSON.stringify(obj, null, 2) }) })
          .then(function (r) { return r.json(); })
          .then(function (j) { if (j.error) throw new Error(j.error); if (msgEl) { msgEl.className = "msg ok"; msgEl.textContent = "✅ 保存成功，网站已更新。"; } });
      }

      function attemptWrite() {
        return fetch(API + "/repos/" + REPO + "/contents/docs/data.json", {
          method: "PUT", headers: headers(true),
          body: JSON.stringify({ message: "[" + currentRoleName() + "] " + (actionDesc || "更新数据"), content: b64utf8(JSON.stringify(obj, null, 2)), sha: dataSha })
        }).then(function (r) {
          if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || "失败"); });
          return r.json();
        }).then(function (j) {
          dataSha = j.content.sha;
          if (msgEl) { msgEl.className = "msg ok"; msgEl.textContent = "✅ 保存成功，网站已更新。"; }
        });
      }

      return attemptWrite().catch(function (err) {
        var msg = err && err.message ? err.message : "";
        if (msg.toLowerCase().indexOf("does not match") > -1 || msg.indexOf("sha") > -1) {
          if (msgEl) { msgEl.textContent = "检测到远程文件已被修改，正在重新获取最新版本…"; }
          return getLatestSha().then(function () {
            if (msgEl) { msgEl.textContent = "已获取最新版本，正在重试保存…"; }
            return attemptWrite();
          }).catch(function (e) {
            throw new Error("重试失败：" + (e && e.message ? e.message : e));
          });
        }
        throw err;
      });
    }
    function currentRoleName() { var r = ROLES[activeRole]; return r ? r.name : "未知"; }

    /* 上传独立文件（如图片）到仓库，返回可访问的 download_url */

        return wkFetch("/api/admin/file", { method: "PUT", body: JSON.stringify({ path: path, content: base64, message: message }) })
          .then(function (r) { return r.json(); }).then(function (j) { if (j.error) throw new Error(j.error); return j.url; });
      }
      return fetch(API + "/repos/" + REPO + "/contents/" + path, {
        method: "PUT", headers: headers(true),
        body: JSON.stringify({ message: message || "上传文件", content: base64 })
      }).then(function (r) {
        if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || "上传失败"); });

      }).then(function (j) { return j.content ? j.content.download_url : null; });
    }

    /* 后台登录成功语音：优先播放 data.json 的 site.havkVoiceUrl（如 assets/login-voice.wav），失败/缺省回退浏览器语音合成 */
    var _loginAudio = null;
    function loginVoiceUrl() {
      var site = (window.D && window.D.data && window.D.data.site) || {};
      return site.havkVoiceUrl || "";
    }
    /* 在用户点击手势内调用：先建好 Audio 并静音试播一次拿到“用户激活”，随后登录成功再正常播放就不会被拦 */
    function primeLoginVoice() {
      var url = loginVoiceUrl();
      if (url) {
        if (!_loginAudio) { _loginAudio = new Audio(url); _loginAudio.preload = "auto"; }
        _loginAudio.muted = true;
        var p = _loginAudio.play();
        if (p && p.then) {
          p.then(function () { try { _loginAudio.pause(); _loginAudio.currentTime = 0; } catch (e) {} _loginAudio.muted = false; })
           .catch(function () { _loginAudio.muted = false; });
        }
      }
      // 预热 TTS 语音列表（首次 getVoices 常为空，需触发异步加载）
      if (window.speechSynthesis) { try { window.speechSynthesis.getVoices(); } catch (e) {} }
    }
    function speakLoginTTS() {
      try {
        if (!window.speechSynthesis) return;
        var u = new SpeechSynthesisUtterance("身份验证通过，巴别塔欢迎您");
        u.lang = "zh-CN"; u.rate = 0.92; u.pitch = 0.85;
        var voices = window.speechSynthesis.getVoices() || [];
        var zhVoices = voices.filter(function (v) { return (v.lang || "").toLowerCase().startsWith("zh"); });
        var pick = voices.find(function (v) { return /male|男|低|沉|deep|yong/i.test(v.name); });
        if (!pick && zhVoices.length) pick = zhVoices[0];
        if (pick) u.voice = pick;
        window.speechSynthesis.speak(u);
      } catch (e) {}
    }
    function playLoginVoice() {
      try {
        var url = loginVoiceUrl();
        if (url) {
          var a = _loginAudio || new Audio(url);
          a.muted = false; a.volume = 1;
          try { a.currentTime = 0; } catch (e) {}
          var p = a.play();
          if (p && p.catch) p.catch(function () { speakLoginTTS(); }); // 播放被拦或失败时回退到 TTS
          return;
        }
        speakLoginTTS();
      } catch (e) { speakLoginTTS(); }
    }

          '<div class="as-group-body" data-group="' + g.name + '">' + items + '</div>';

        el.addEventListener("click", function () { showPanel(el.getAttribute("data-panel")); });

      list.querySelectorAll(".as-group").forEach(function (el) {

          var name = el.getAttribute("data-group");
          var cur; try { cur = JSON.parse(localStorage.getItem("di_collapsed_groups") || "{}"); } catch (e) { cur = {}; }
          cur[name] = !cur[name];

          el.classList.toggle("collapsed");
        });

      list.querySelectorAll(".as-group-body .as-item").forEach(function (el) {
        el.addEventListener("click", function () { showPanel(el.getAttribute("data-panel")); });

    /* ============ 资讯管理（V34） ============ */
    function mountNews(c) {
      if (adminMode() !== "worker") {
        c.innerHTML = '<div class="status">此功能需以总/分管理员身份登录 Worker 后使用。</div>';
        return;
      }
      // 各分类字段 schema（req=必填，ta=多行，num=数字，bool=是否直播中）
      var SCHEMA = {
        news: [
          { k: "title", t: "标题", req: true },
          { k: "source", t: "来源", ph: "官方公告" },
          { k: "date", t: "日期", ph: "2026-07-15" },
          { k: "summary", t: "摘要", ta: true },
          { k: "url", t: "链接", ph: "https://… 留空表示暂无链接" },
          { k: "thumb", t: "封面图 URL（可选）" },
          { k: "views", t: "浏览量（可选）", num: true },
          { k: "likes", t: "点赞（可选）", num: true }
        ],
        live: [
          { k: "platform", t: "平台", ph: "B站 / 抖音 / YouTube" },
          { k: "streamer", t: "主播" },
          { k: "title", t: "标题", req: true },
          { k: "viewers", t: "观看人数", num: true },
          { k: "live", t: "是否直播中", bool: true },
          { k: "url", t: "直播间链接", ph: "留空表示暂无链接" }
        ],
        videos: [
          { k: "platform", t: "平台" },
          { k: "title", t: "标题", req: true },
          { k: "author", t: "作者 / UP 主" },
          { k: "duration", t: "时长", ph: "12:30" },
          { k: "thumb", t: "封面 URL（可选）" },
          { k: "url", t: "视频链接", ph: "留空表示暂无链接" }
        ]
      };
      var TABS = [["news", "📰 资讯"], ["live", "🔴 直播"], ["videos", "🎬 视频"]];
      var LABEL = { news: "资讯", live: "直播", videos: "视频" };
      var data = { news: [], live: [], videos: [] };
      var tab = "news";
      var loaded = false;

      c.innerHTML =
        '<div class="panel-card"><h3>📰 资讯 / 直播 / 视频管理</h3>' +
        '<p class="panel-tip">可视化维护前台「资讯中心」(news.html) 条目，保存后即时生效（写入 data.json）。<b>链接留空即显示「暂无链接」</b>，不会出现瞎开的假链接。</p>' +
        '<div class="news-tabs" id="newsTabs"></div>' +
        '<div class="ne-add"><button class="btn sm primary" id="newsAdd">➕ 新增一条</button> <span class="ne-count" id="newsCount"></span></div>' +
        '<div id="newsList"><div class="status">加载中…</div></div>' +
        '<div class="ne-foot"><button class="btn sm" id="newsLoad">🔄 重新拉取</button> <button class="btn sm primary" id="newsSave">💾 保存全部</button> <span class="ne-count">共 <span id="newsTotal">0</span> 条</span></div>' +
        '<div class="msg" id="newsMsg"></div></div>';

      function setMsg(t, ok) { var m = document.getElementById("newsMsg"); m.className = "msg" + (ok ? " ok" : " err"); m.textContent = t; }
      function curObj(cb) {
        wkFetch("/api/admin/data").then(function (r) { return r.json(); }).then(function (j) {
          var o = {}; try { o = JSON.parse(j.content || "{}"); } catch (e) { o = {}; }
          cb(o);
        }).catch(function () { setMsg("拉取失败，请检查 Worker 或登录状态。", false); });
      }
      function renderTabs() {
        var box = document.getElementById("newsTabs");
        box.innerHTML = TABS.map(function (t) {
          return '<div class="nt' + (t[0] === tab ? " on" : "") + '" data-t="' + t[0] + '">' + t[1] + ' <span class="ne-count">(' + (data[t[0]] || []).length + ")</span></div>";
        }).join("");
        box.querySelectorAll("[data-t]").forEach(function (b) {
          b.addEventListener("click", function () { tab = b.getAttribute("data-t"); renderTabs(); renderList(); });
        });
      }
      function fieldHtml(type, idx, f, val) {
        var id = "nf_" + type + "_" + idx + "_" + f.k;
        var v = (val == null ? "" : val);
        var cls = "ne-field" + (f.req && !v ? " invalid" : "");
        var inp;
        if (f.ta) inp = '<textarea id="' + id + '" data-t="' + type + '" data-i="' + idx + '" data-k="' + f.k + '" placeholder="' + esc(f.ph || "") + '">' + esc(v) + "</textarea>";
        else if (f.bool) inp = '<select id="' + id + '" data-t="' + type + '" data-i="' + idx + '" data-k="' + f.k + '"><option value="1"' + (v ? ' selected' : '') + '>直播中</option><option value="0"' + (!v ? ' selected' : '') + '>未直播</option></select>';
        else inp = '<input id="' + id + '" data-t="' + type + '" data-i="' + idx + '" data-k="' + f.k + '" type="' + (f.num ? "number" : "text") + '" value="' + esc(v) + '" placeholder="' + esc(f.ph || "") + '" />';
        return '<div class="' + cls + '"><label>' + esc(f.t) + (f.req ? " *" : "") + "</label>" + inp + "</div>";
      }
      function renderList() {
        var box = document.getElementById("newsList");
        var arr = data[tab] || [];
        document.getElementById("newsCount").textContent = "当前标签：" + arr.length + " 条";
        document.getElementById("newsTotal").textContent = (data.news.length + data.live.length + data.videos.length);
        if (!arr.length) { box.innerHTML = '<div class="um-empty"><span class="ico">🗂</span>该分类暂无条目，点上方「➕ 新增一条」。<div class="hint">保存后前台资讯中心即更新。</div></div>'; return; }
        box.innerHTML = arr.map(function (it, idx) {
          var head = it.title || it.streamer || ("第 " + (idx + 1) + " 条");
          var urlEmpty = !it.url;
          return '<div class="ne-card"><div class="ne-head"><div class="ne-idx">' + (idx + 1) + '</div>' +
            '<div class="ne-title">' + esc(head) + "</div>" +
            (urlEmpty ? '<span class="ne-badge">暂无链接</span>' : '<span class="ne-badge ok">有链接</span>') +
            '<button class="btn sm danger ne-del" data-del="' + idx + '">删除</button></div>' +
            '<div class="ne-grid">' + SCHEMA[tab].map(function (f) { return fieldHtml(tab, idx, f, it[f.k]); }).join("") + "</div></div>";
        }).join("");
        box.querySelectorAll("[data-t]").forEach(function (inp) { inp.addEventListener("input", onField); inp.addEventListener("change", onField); });
        box.querySelectorAll("[data-del]").forEach(function (b) {
          b.addEventListener("click", function () {
            var i = parseInt(b.getAttribute("data-del"), 10);
            data[tab].splice(i, 1); renderTabs(); renderList();
          });
        });
      }
      function onField(e) {
        var t = e.target.getAttribute("data-t"), i = parseInt(e.target.getAttribute("data-i"), 10), k = e.target.getAttribute("data-k");
        var val = e.target.value;
        if (e.target.type === "number") val = val === "" ? "" : Number(val);
        if (e.target.tagName === "SELECT") val = e.target.value === "1";
        data[t][i][k] = val;
        var wrap = e.target.closest ? e.target.closest(".ne-field") : null;
        if (wrap) wrap.classList.remove("invalid");
      }
      function buildData() {
        ["news", "live", "videos"].forEach(function (type) {
          data[type] = data[type].map(function (it) {
            var o = {};
            SCHEMA[type].forEach(function (f) {
              var v = it[f.k];
              if (f.num) v = (v === "" || v == null) ? "" : Number(v);
              o[f.k] = v;
            });
            return o;
          });
        });
        return data;
      }
      function validate() {
        for (var ti = 0; ti < TABS.length; ti++) {
          var type = TABS[ti][0];
          for (var i = 0; i < data[type].length; i++) {
            for (var s = 0; s < SCHEMA[type].length; s++) {
              var f = SCHEMA[type][s];
              if (f.req && !(data[type][i][f.k])) return { type: type, i: i, f: f };
            }
          }
        }
        return null;
      }
      function loadData() {
        document.getElementById("newsList").innerHTML = '<div class="status">加载中…</div>';
        curObj(function (obj) {
          data.news = Array.isArray(obj.news) ? obj.news : [];
          data.live = Array.isArray(obj.live) ? obj.live : [];
          data.videos = Array.isArray(obj.videos) ? obj.videos : [];
          loaded = true;
          renderTabs(); renderList();
          setMsg("已拉取当前 data.json 内容。", true);
        });
      }
      document.getElementById("newsAdd").addEventListener("click", function () {
        if (!loaded) { setMsg("请先等数据拉取完成。", false); return; }
        var item = {}; SCHEMA[tab].forEach(function (f) { item[f.k] = f.bool ? false : ""; });
        data[tab].push(item); renderTabs(); renderList();
      });
      document.getElementById("newsLoad").addEventListener("click", function () {
        if (!confirm("重新拉取会覆盖当前未保存的修改，确定？")) return;
        loadData();
      });
      document.getElementById("newsSave").addEventListener("click", function () {
        if (!loaded) { setMsg("数据尚未加载完成，请稍候。", false); return; }
        setMsg("保存中…", true);
        curObj(function (obj) {
          buildData();
          var err = validate();
          if (err) {
            tab = err.type; renderTabs(); renderList();
            var inp = document.getElementById("nf_" + err.type + "_" + err.i + "_" + err.f.k);
            if (inp && inp.closest) inp.closest(".ne-field").classList.add("invalid");
            setMsg("「" + LABEL[err.type] + "」第 " + (err.i + 1) + " 条「" + err.f.t + "」不能为空", false);
            return;
          }
          var built = JSON.parse(JSON.stringify(data));
          obj.news = built.news; obj.live = built.live; obj.videos = built.videos;
          wkFetch("/api/admin/data", { method: "PUT", body: JSON.stringify({ content: JSON.stringify(obj, null, 2) }) })
            .then(function (r) { return r.json(); })
            .then(function (k) { if (k.error) { setMsg(k.error, false); return; } setMsg("✅ 已保存，前台资讯中心即将更新。", true); })
            .catch(function () { setMsg("保存失败，请检查 Worker。", false); });
        });
      });
      loadData();
    }

    /* ============ 战队管理（V33，总览） ============ */
    function mountTeams(c) {
      if (adminMode() !== "worker") {
        c.innerHTML = '<div class="status">此功能需以总/分管理员身份登录 Worker 后使用。</div>';
        return;
      }
      c.innerHTML =
        '<div class="panel-card"><h3>⚔ 战队 / 公会管理（总览）</h3>' +
        '<p class="panel-tip">总览全站战队（数据存于 Cloudflare Worker 的 TEAMS KV）。可置顶精选优质战队，或解散违规战队。</p>' +
        '<div class="dev-tools"><button class="btn sm" id="teamsRefresh">🔄 刷新</button></div>' +
        '<div id="teamsList"><div class="status">加载中…</div></div></div>';

      function load() {
        var box = document.getElementById("teamsList");
        box.innerHTML = '<div class="status">加载中…</div>';
        wkFetch("/api/admin/teams").then(function (r) { return r.json(); }).then(function (j) {
          if (j.error) { box.innerHTML = '<div class="status" style="color:#ff5b5b">' + esc(j.error) + '</div>'; return; }
          var ts = j.teams || [];
          if (!ts.length) { box.innerHTML = '<div class="status">暂无战队。</div>'; return; }
          box.innerHTML = '<div class="ui-role-grid">' + ts.map(function (t) {
            var star = t.featured ? ' <span style="color:#d29922">★置顶</span>' : '';
            return '<div class="ui-role-row">' +
              '<div class="ui-role-name">' + esc(t.name) + ' <small style="color:#8b949e">[' + esc(t.tag) + ']</small>' + star +
              '<br><small style="color:var(--muted)">队长：' + esc(t.owner) + ' · 成员 ' + t.memberCount + ' · 战绩 ' + t.recordCount + '</small></div>' +
              '<div class="dev-tools">' +
                '<button class="btn sm" data-feat="' + esc(t.id) + '" data-on="' + (t.featured ? "1" : "0") + '">' + (t.featured ? "取消置顶" : "置顶") + '</button>' +
                '<button class="btn sm danger" data-del="' + esc(t.id) + '">解散</button>' +
              '</div></div>';
          }).join("") + '</div>';
          box.querySelectorAll("[data-feat]").forEach(function (b) {
            b.addEventListener("click", function () {
              var id = b.getAttribute("data-feat");
              var on = b.getAttribute("data-on") === "1";
              wkFetch("/api/admin/teams/" + id + "/feature", { method: "POST", body: JSON.stringify({ featured: !on }) })
                .then(function (r) { return r.json(); }).then(function (k) { if (k.error) alert(k.error); else load(); })
                .catch(function () { alert("操作失败"); });
            });
          });
          box.querySelectorAll("[data-del]").forEach(function (b) {
            b.addEventListener("click", function () {
              if (!confirm("确定解散该战队？此操作不可恢复。")) return;
              var id = b.getAttribute("data-del");
              wkFetch("/api/admin/teams/" + id, { method: "DELETE" })
                .then(function (r) { return r.json(); }).then(function (k) { if (k.error) alert(k.error); else load(); })
                .catch(function () { alert("操作失败"); });
            });
          });
        }).catch(function () { box.innerHTML = '<div class="status" style="color:#ff5b5b">加载失败，请检查 Worker。</div>'; });
      }
      document.getElementById("teamsRefresh").addEventListener("click", load);
      load();
    }

    /* ============ 注册用户管理（总管理员 / 用户管理分管理员） ============ */
    function mountUserMgr(c) {
      if (adminMode() !== "worker") {
        c.innerHTML = '<div class="status">此功能需以管理员身份登录 Worker 后使用。</div>';
        return;
      }
      var owned = (ROLES[activeRole] && ROLES[activeRole].panels) || [];
      if (activeRole !== "super" && owned.indexOf("usermgr") < 0) {
        c.innerHTML = '<div class="status" style="color:#ff5b5b">只有总管理员或「用户管理」分管理员可进入此页面。</div>';
        return;
      }
      c.innerHTML =
        '<div class="panel-card">' +
          '<h3>👥 注册用户管理</h3>' +
          '<div class="panel-tip">管理<b>普通注册会员</b>（前台注册的玩家账号）：搜索、查看详情、禁用/启用、设为信任用户（免 AI 审核直接发布）、重置密码、删除账号。<br>注：这里<b>只显示普通会员</b>；如果你注册的是<b>管理员账号</b>，请到左侧「🛡 分管理员管理」查看。</div>' +
          '<div class="um-toolbar">' +
            '<div class="um-search"><span class="ic">🔍</span><input id="umSearch" placeholder="搜索昵称 / 邮箱 / 账号"></div>' +
            '<button class="btn sm" id="umReload">🔄 刷新</button>' +
          '</div>' +
          '<div id="umStats" class="um-stats"></div>' +
          '<div id="umFilters" class="um-filters"></div>' +
          '<div id="umList" class="um-list"><div class="um-skel"></div><div class="um-skel"></div><div class="um-skel"></div></div>' +
        '</div>';
      var allMembers = [];
      var kw = "";
      var flt = "all"; // all | normal | disabled | trusted
      var listEl = document.getElementById("umList");

      function fmtDate(ts) {
        if (!ts) return "未知";
        try { return new Date(ts).toLocaleString("zh-CN", { hour12: false }); } catch (e) { return String(ts); }
      }
      function fmtDateShort(ts) {
        if (!ts) return "未知";
        try { return new Date(ts).toLocaleDateString("zh-CN"); } catch (e) { return String(ts); }
      }
      /* 头像底色：根据账号 id 稳定取色 */
      function avaColor(id) {
        var s = String(id || "?"), h = 0, i;
        for (i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
        return "hsl(" + (h % 360) + ",62%,48%)";
      }
      function avaText(u) {
        var s = (u.name || u.id || "?").trim();
        return s ? s.charAt(0) : "?";
      }
      function filtered() {
        var q = kw.trim().toLowerCase();
        return allMembers.filter(function (u) {
          if (flt === "normal" && u.disabled) return false;
          if (flt === "disabled" && !u.disabled) return false;
          if (flt === "trusted" && !u.trusted) return false;
          if (!q) return true;
          return (u.id || "").toLowerCase().includes(q) || (u.name || "").toLowerCase().includes(q) || (u.email || "").toLowerCase().includes(q);
        });
      }
      function renderStats() {
        var total = allMembers.length;
        var dis = allMembers.filter(function (u) { return u.disabled; }).length;
        var tru = allMembers.filter(function (u) { return u.trusted; }).length;
        document.getElementById("umStats").innerHTML =
          '<div class="um-stat total"><div class="n">' + total + '</div><div class="l">注册会员总数</div></div>' +
          '<div class="um-stat"><div class="n">' + (total - dis) + '</div><div class="l">正常</div></div>' +
          '<div class="um-stat dis"><div class="n">' + dis + '</div><div class="l">已禁用</div></div>' +
          '<div class="um-stat tru"><div class="n">' + tru + '</div><div class="l">信任用户</div></div>';
        var chips = [["all", "全部"], ["normal", "正常"], ["disabled", "已禁用"], ["trusted", "信任用户"]];
        document.getElementById("umFilters").innerHTML = chips.map(function (x) {
          return '<span class="um-chip' + (flt === x[0] ? " on" : "") + '" data-f="' + x[0] + '">' + x[1] + '</span>';
        }).join("");
        document.getElementById("umFilters").querySelectorAll(".um-chip").forEach(function (ch) {
          ch.addEventListener("click", function () { flt = ch.getAttribute("data-f"); render(); });
        });
      }
      function render() {
        renderStats();
        var ms = filtered();
        if (!ms.length) {
          listEl.innerHTML = allMembers.length
            ? '<div class="um-empty"><span class="ico">🔍</span>没有符合当前筛选/搜索条件的会员。</div>'
            : '<div class="um-empty"><span class="ico">📭</span>暂无注册会员。<div class="hint">前台有玩家用「邮箱注册」后，这里才会出现。<br>若你注册的是管理员，请到「分管理员管理」；数据异常可点上方「🔄 刷新」重新调取。</div></div>';
          return;
        }
        listEl.innerHTML = ms.map(function (u) {
          var tags = '';
          if (u.disabled) tags += '<span class="um-tag dis">已禁用</span>';
          if (u.trusted) tags += '<span class="um-tag tru">信任</span>';
          return '<div class="um-card' + (u.disabled ? " is-disabled" : "") + '">' +
            '<div class="um-ava" style="background:' + avaColor(u.id) + '">' + esc(avaText(u)) + '</div>' +
            '<div class="um-main">' +
              '<div class="um-name">' + esc(u.name || u.id) + tags + '</div>' +
              '<div class="um-meta">' + esc(u.id) + ' · Lv.' + (u.level || 1) + ' · 积分 ' + esc(u.points || 0) + ' · 注册于 ' + fmtDateShort(u.createdAt) + '</div>' +
            '</div>' +
            '<div class="um-acts">' +
              '<button class="btn sm" data-act="detail" data-id="' + esc(u.id) + '">详情</button>' +
              (u.disabled
                ? '<button class="btn role-c" data-act="enable" data-id="' + esc(u.id) + '">启用</button>'
                : '<button class="btn role-c" data-act="disable" data-id="' + esc(u.id) + '">禁用</button>') +
              '<button class="btn role-c" data-act="trust" data-id="' + esc(u.id) + '">' + (u.trusted ? "取消信任" : "信任") + '</button>' +
              '<button class="btn role-c" data-act="reset" data-id="' + esc(u.id) + '">重置密码</button>' +
              '<button class="btn role-d" data-act="del" data-id="' + esc(u.id) + '">删除</button>' +
            '</div></div>';
        }).join("");
        bindActions();
      }
      function bindActions() {
        listEl.querySelectorAll("button[data-act]").forEach(function (b) {
          b.addEventListener("click", function () {
            var act = b.getAttribute("data-act");
            var id = b.getAttribute("data-id");
            if (act === "detail") return showDetail(id);
            if (act === "reset") return resetPw(id);
            if (act === "del" && !confirm("确定删除用户 " + id + "？此操作不可恢复。")) return;
            var body, method, url;
            if (act === "del") { method = "DELETE"; url = "/api/admin/member"; body = { id: id }; }
            else if (act === "trust") { method = "PUT"; url = "/api/admin/member/trusted"; body = { id: id, trusted: !b.textContent.includes("取消") }; }
            else { method = "PUT"; url = "/api/admin/member"; body = { id: id, disabled: act === "disable" }; }
            b.disabled = true;
            wkFetch(url, { method: method, body: JSON.stringify(body) })
              .then(function (r) { return r.json(); })
              .then(function (j) { if (j.error) alert(j.error); load(); })
              .catch(function () { alert("操作失败"); b.disabled = false; });
          });
        });
      }
      function showDetail(id) {
        wkFetch("/api/admin/member/" + encodeURIComponent(id))
          .then(function (r) { return r.json(); })
          .then(function (j) {
            if (j.error) { alert(j.error); return; }
            var u = j.user;
            var html = '<div class="um-detail" id="umDetail">' +
              '<h4>👤 用户详情<button class="btn sm" id="umDetailClose">关闭</button></h4>' +
              '<div class="kv">' +
                '<b>账号</b><span>' + esc(u.id) + '</span>' +
                '<b>昵称</b><span>' + esc(u.name || "未设置") + '</span>' +
                '<b>等级</b><span>Lv.' + (u.level || 1) + ' · 积分 ' + (u.points || 0) + ' · 连续签到 ' + (u.streak || 0) + ' 天</span>' +
                '<b>状态</b><span>' + (u.disabled ? '已禁用' : '正常') + ' · ' + (u.trusted ? '信任用户（免 AI 审核）' : '普通用户（AI 自动审核）') + '</span>' +
                '<b>注册时间</b><span>' + fmtDate(u.createdAt) + '</span>' +
                '<b>最后签到</b><span>' + esc(u.lastCheckin || "无") + '</span>' +

    /* ============ 赛季任务管理 ============ */
    function mountTasks(c) {
      c.innerHTML =
        '<div class="panel-card"><h3>📋 任务列表</h3>' +
          '<div class="field"><input id="tAdminSearch" placeholder="搜索任务…"></div>' +
          '<div id="tList"><div class="status">加载中…</div></div></div>' +
        '<div class="panel-card"><h3>➕ 添加分组</h3>' +
          '<div class="row"><input id="tgName" placeholder="分组名称，例如：行动任务" style="flex:1">' +
          '<button class="btn role-c" id="addGroup">添加分组</button></div>' +
          '<div class="msg" id="tgMsg"></div></div>' +
        '<div class="panel-card"><h3>✏️ 添加 / 编辑任务</h3>' +
          '<input type="hidden" id="tId">' +
          '<div class="field"><label>所属分组</label><select id="tGroup"></select></div>' +
          '<div class="field"><label>任务标题</label><input id="tTitle" placeholder="例如：第1阶段任务"></div>' +
          '<div class="field"><label>任务内容</label><textarea id="tBody" placeholder="具体要求、奖励、注意事项…"></textarea></div>' +
          '<div class="row"><button class="btn role-c" id="saveTask">保存任务</button>' +
          '<button class="btn ghost" id="newTask">清空新建</button><span class="msg" id="tFormMsg"></span></div>' +
          '<div class="msg" id="tMsg"></div></div>';

      function getTasks(d) { return d.obj.tasks || { search: "", groups: [] }; }
      function refreshSel(groups) {
        document.getElementById("tGroup").innerHTML = (groups || []).map(function (g) {
          return '<option value="' + esc(g.id) + '">' + esc(g.name) + "</option>";
        }).join("");
      }
      function load() {
        getDataObj().then(function (d) {
          var tasks = getTasks(d);
          var q = document.getElementById("tAdminSearch").value.toLowerCase();
          var box = document.getElementById("tList");
          if (!tasks.groups.length) { box.innerHTML = '<div class="status">暂无分组。在下方添加分组。</div>'; refreshSel([]); return; }
          box.innerHTML = tasks.groups.map(function (g) {
            var items = (g.items || []).filter(function (it) { return !q || (it.title + " " + it.content).toLowerCase().indexOf(q) > -1; });
            var ih = items.length ? items.map(function (it) {
              return '<div style="padding:8px 0 8px 18px;border-bottom:1px solid var(--border)">' +
                '<b>' + esc(it.title) + "</b>" + (it.done ? " ✅" : "") +
                '<div style="color:var(--muted);font-size:12px;margin-top:2px">' + esc(it.content || "") + "</div>" +
                '<div style="margin-top:4px"><button class="btn sm act-edit" data-gid="' + esc(g.id) + '" data-tid="' + esc(it.id) + '">编辑</button> ' +
                '<button class="btn danger sm act-del" data-gid="' + esc(g.id) + '" data-tid="' + esc(it.id) + '">删除</button></div></div>';
            }).join("") : '<div style="padding:6px 0 6px 18px;color:var(--muted);font-size:12px">该分组暂无任务</div>';
            return '<div style="border:1px dashed var(--border);border-radius:10px;padding:10px;margin-bottom:10px">' +
              '<div style="font-weight:700">' + (g.open ? "▾" : "▸") + " " + esc(g.name) + ' <span style="color:var(--muted);font-size:12px">(' + items.length + ")</span></div>" +
              ih + "</div>";
          }).join("");
          refreshSel(tasks.groups);
          box.querySelectorAll(".act-edit").forEach(function (b) { b.onclick = function () { editTask(b.getAttribute("data-gid"), b.getAttribute("data-tid")); }; });
          box.querySelectorAll(".act-del").forEach(function (b) { b.onclick = function () { delTask(b.getAttribute("data-gid"), b.getAttribute("data-tid")); }; });
        }).catch(function () {});
      }
      function newTask() { document.getElementById("tFormTitle"); document.getElementById("tId").value = ""; document.getElementById("tTitle").value = ""; document.getElementById("tBody").value = ""; document.getElementById("tFormMsg").textContent = ""; }
      function editTask(gid, tid) {
        getDataObj().then(function (d) {
          var tasks = getTasks(d);
          var g = tasks.groups.find(function (x) { return x.id === gid; });
          var t = g && g.items.find(function (x) { return x.id === tid; });
          if (!t) return;
          document.getElementById("tGroup").value = gid;
          document.getElementById("tId").value = tid;
          document.getElementById("tTitle").value = t.title || "";
          document.getElementById("tBody").value = t.content || "";
          document.getElementById("tFormMsg").textContent = "编辑中…";
        });
      }
      document.getElementById("newTask").onclick = newTask;
      document.getElementById("addGroup").onclick = function () {
        var name = document.getElementById("tgName").value.trim(); var msg = document.getElementById("tgMsg");
        if (!name) { msg.className = "msg err"; msg.textContent = "请输入分组名称。"; return; }
        getDataObj().then(function (d) {
          var tasks = getTasks(d); tasks.groups = tasks.groups || [];
          tasks.groups.push({ id: "g" + Date.now(), name: name, open: true, items: [] });
          d.obj.tasks = tasks;
          return putDataObj(d.obj, "新增任务分组：" + name, msg).then(function () { load(); document.getElementById("tgName").value = ""; });
        }).catch(function (e) { msg.className = "msg err"; msg.textContent = "❌ " + e.message; });
      };
      document.getElementById("saveTask").onclick = function () {
        var gid = document.getElementById("tGroup").value; var id = document.getElementById("tId").value;
        var title = document.getElementById("tTitle").value.trim(); var body = document.getElementById("tBody").value.trim();
        var msg = document.getElementById("tFormMsg");
        if (!title) { msg.className = "msg err"; msg.textContent = "任务标题必填。"; return; }
        getDataObj().then(function (d) {
          var tasks = getTasks(d); var g = tasks.groups.find(function (x) { return x.id === gid; });
          if (!g) throw new Error("分组不存在");
          g.items = g.items || [];
          if (id) { var t = g.items.find(function (x) { return x.id === id; }); if (t) { t.title = title; t.content = body; } }
          else { g.items.push({ id: "t" + Date.now(), title: title, content: body, done: false, open: false }); }
          d.obj.tasks = tasks;
          return putDataObj(d.obj, (id ? "编辑任务：" : "新增任务：") + title, msg).then(function () { load(); newTask(); });
        }).catch(function (e) { msg.className = "msg err"; msg.textContent = "❌ " + e.message; });
      };
      function delTask(gid, tid) {
        if (!confirm("确定删除该任务？")) return;
        var msg = document.getElementById("tMsg");
        getDataObj().then(function (d) {
          var tasks = getTasks(d); var g = tasks.groups.find(function (x) { return x.id === gid; });
          if (g) g.items = (g.items || []).filter(function (x) { return x.id !== tid; });
          d.obj.tasks = tasks;
          return putDataObj(d.obj, "删除任务", msg).then(function () { load(); newTask(); });
        }).catch(function (e) { msg.className = "msg err"; msg.textContent = "❌ " + e.message; });
      }
      document.getElementById("tAdminSearch").addEventListener("input", load);
      load();
    }

    function loadPosts() {
      var box = document.getElementById("posts");
      box.innerHTML = '<div class="status">加载中…</div>';
      fetch(API + "/repos/" + REPO + "/issues?labels=" + encodeURIComponent("💬 论坛") + "&state=all&sort=created&direction=desc&per_page=50", { headers: headers(false) })
        .then(function (r) { return r.json(); })
        .then(function (list) {
          if (!Array.isArray(list) || !list.length) { box.innerHTML = '<div class="status">还没有帖子。</div>'; return; }
          box.innerHTML = list.filter(function (it) { return !it.pull_request; }).map(function (it) {
            var closed = it.state === "closed";
            return '<div class="post" data-num="' + it.number + '">' +
              '<div class="pmeta"><span class="pauthor">' + esc(it.user && it.user.login) + '</span><span>' + esc(it.state) + '</span><span>💬 ' + (it.comments || 0) + '</span></div>' +
              '<div class="ptitle">' + esc(it.title) + '</div><div class="pbody">' + esc(it.body || "") + '</div>' +
              '<div class="row" style="margin-top:8px">' + (closed ? '<span class="msg">已关闭</span>' : '<button class="btn danger sm act-del" data-num="' + it.number + '">删除/关闭</button>') + '</div></div>';
          }).join("");
          box.querySelectorAll(".act-del").forEach(function (b) {
            b.onclick = function () {
              if (!confirm("确定关闭该帖子？")) return;
              fetch(API + "/repos/" + REPO + "/issues/" + b.getAttribute("data-num"), { method: "PATCH", headers: headers(true), body: JSON.stringify({ state: "closed" }) })
                .then(function (r) { if (!r.ok) return r.json().then(function (j) { throw new Error(j.message || "失败"); }); loadPosts(); })
                .catch(function (e) { alert("操作失败：" + (e.message || e)); });
            };
          });
        }).catch(function () { box.innerHTML = '<div class="status err">加载失败，请确认 Token 权限。</div>'; });
    }

          '<div class="row"><button class="btn role-c" id="' + key + 'Save">保存</button><span class="msg" id="' + key + 'Msg"></span></div></div>';

          return "<td><input class='" + key + "-" + col.f + "' value='" + esc(v == null ? '' : v) + "'></td>";
        }).join('') + "<td class='col-act'><button class='btn danger sm " + key + "-del'>删</button></td></tr>";

    /* ============ 新手攻略（guides） ============ */

        var el = c.querySelector("#gdMods");
        if (!mods.length) { el.innerHTML = '<div class="status">暂无模块，点“添加模块”。</div>'; return; }
        el.innerHTML = mods.map(function (m, i) {
          var cardsHtml = (m.cards || []).map(function (card, j) {
            return '<div class="gd-card"><input class="gd-ctitle" value="' + esc(card.title || "") + '" placeholder="卡片标题">' +
              '<textarea class="gd-ctext" rows="2" placeholder="卡片内容">' + esc(card.text || "") + '</textarea>' +
              '<button class="btn danger sm gd-delcard" data-i="' + i + '" data-j="' + j + '">删卡片</button></div>';
          }).join("");
          return '<div class="gd-mod"><div class="row"><input class="gd-mtitle" value="' + esc(m.title || "") + '" placeholder="模块标题"> ' +
            '<input class="gd-micon" value="' + esc(m.icon || "") + '" placeholder="图标" style="width:60px"> ' +
            '<button class="btn danger sm gd-delmod" data-i="' + i + '">删模块</button></div>' +
            '<div class="gd-cards">' + cardsHtml + '</div>' +
            '<button class="btn role-c sm gd-addcard" data-i="' + i + '">＋ 添加卡片</button></div>';
        }).join("");
        el.querySelectorAll(".gd-delmod").forEach(function (b) { b.onclick = function () { mods.splice(+b.getAttribute("data-i"), 1); renderMods(); }; });
        el.querySelectorAll(".gd-addcard").forEach(function (b) { b.onclick = function () { var i = +b.getAttribute("data-i"); mods[i].cards = mods[i].cards || []; mods[i].cards.push({ title: "", text: "" }); renderMods(); }; });
        el.querySelectorAll(".gd-delcard").forEach(function (b) { b.onclick = function () { var i = +b.getAttribute("data-i"), j = +b.getAttribute("data-j"); mods[i].cards.splice(j, 1); renderMods(); }; });
      }
      getDataObj().then(function (d) {
        var g = d.obj.guides || {};
        c.querySelector("#gdIntro").value = g.intro || "";
        mods = (g.modules || []).map(function (m) { return { title: m.title || "", icon: m.icon || "", cards: (m.cards || []).map(function (x) { return { title: x.title || "", text: x.text || "" }; }) }; });
        if (!mods.length) mods = [{ title: "", icon: "", cards: [] }];
        renderMods();
      }).catch(function () {});
      c.querySelector("#gdAddMod").onclick = function () { mods.push({ title: "", icon: "", cards: [] }); renderMods(); };
      c.querySelector("#gdSave").onclick = function () {
        var msg = c.querySelector("#gdMsg");
        var collected = mods.map(function (m) {
          return { title: m.title, icon: m.icon, cards: (m.cards || []).map(function (card) { return { title: card.title, text: card.text }; }).filter(function (card) { return card.title || card.text; }) };
        }).filter(function (m) { return m.title; });
        getDataObj().then(function (d) {
          d.obj.guides = { intro: c.querySelector("#gdIntro").value.trim(), modules: collected };
          return putDataObj(d.obj, "更新新手攻略（" + collected.length + " 模块）", msg);
        }).catch(function (e) { msg.className = "msg err"; msg.textContent = "❌ " + e.message; });
      };
    }

            '<button class="btn danger sm cf-delnode" data-i="' + i + '">删</button></div></div>';
        }).join("");
        el.querySelectorAll(".cf-delnode").forEach(function (b) { b.onclick = function () { nodes.splice(+b.getAttribute("data-i"), 1); renderNodes(); }; });
      }
      getDataObj().then(function (d) {
        var g = d.obj.craft || {};
        nodes = (g.nodes || []).map(function (n) { return { key: n.key || "", text: n.text || "", station: n.station || "", cat: n.cat || "" }; });
        if (!nodes.length) nodes = [{ key: "", text: "", station: "", cat: "" }];
        renderNodes();
        c.querySelector("#cfLinks").value = JSON.stringify(g.links || [], null, 2);

      c.querySelector("#cfAddNode").onclick = function () { nodes.push({ key: "", text: "", station: "", cat: "" }); renderNodes(); };

        var msg = c.querySelector("#cfMsg");

        var linksText = c.querySelector("#cfLinks").value.trim();

        getDataObj().then(function (d) {
          d.obj.craft = { nodes: collected, links: links };
          return putDataObj(d.obj, "更新制作树（" + collected.length + " 节点）", msg);
        }).catch(function (e) { msg.className = "msg err"; msg.textContent = "❌ " + e.message; });
      };
    }
