<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1a2830" stroke-width="0.5"/>
    </pattern>
    <pattern id="rough" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="40" r="1.2" fill="#1e2e36" opacity="0.5"/>
      <circle cx="80" cy="90" r="1.5" fill="#1e2e36" opacity="0.4"/>
      <circle cx="60" cy="15" r="1" fill="#1e2e36" opacity="0.5"/>
      <circle cx="100" cy="60" r="1.3" fill="#1e2e36" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- 背景 -->
  <rect width="800" height="600" fill="#0f181d"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#rough)"/>
  <!-- 边界 -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#2c4a53" stroke-width="2" stroke-dasharray="10,6"/>
  <!-- 溪谷河流 -->
  <path d="M0 300 Q200 320 350 260 T650 220 T800 180" fill="none" stroke="#2a5c6e" stroke-width="22" opacity="0.5"/>
  <path d="M0 300 Q200 320 350 260 T650 220 T800 180" fill="none" stroke="#3d8399" stroke-width="8" opacity="0.35"/>
  <!-- 支流 -->
  <path d="M280 0 Q300 120 350 200 T420 350 T380 600" fill="none" stroke="#2a5c6e" stroke-width="12" opacity="0.4"/>
  <!-- 钻石皇后酒店 -->
  <g transform="translate(500,220)">
    <rect x="0" y="0" width="160" height="120" fill="#1a2a30" stroke="#4a7c8a" stroke-width="1.5"/>
    <rect x="10" y="10" width="60" height="40" fill="#132027" stroke="#4a7c8a" stroke-width="1"/>
    <rect x="80" y="10" width="70" height="40" fill="#132027" stroke="#4a7c8a" stroke-width="1"/>
    <rect x="10" y="60" width="65" height="50" fill="#132027" stroke="#4a7c8a" stroke-width="1"/>
    <rect x="85" y="60" width="65" height="50" fill="#132027" stroke="#4a7c8a" stroke-width="1"/>
    <rect x="75" y="-15" width="10" height="15" fill="#1a2a30" stroke="#4a7c8a" stroke-width="1"/>
    <text x="80" y="70" fill="#8fc4d4" font-size="11" text-anchor="middle" font-family="Arial">HOTEL</text>
  </g>
  <!-- 雷达站/通讯塔 -->
  <g transform="translate(150,120)">
    <rect x="0" y="0" width="80" height="60" fill="#1a2a30" stroke="#4a7c8a" stroke-width="1.5"/>
    <line x1="40" y1="0" x2="40" y2="-60" stroke="#7f8c8d" stroke-width="2"/>
    <circle cx="40" cy="-60" r="5" fill="#e74c3c" opacity="0.8"/>
    <line x1="40" y1="-60" x2="25" y2="-45" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="40" y1="-60" x2="55" y2="-45" stroke="#7f8c8d" stroke-width="1"/>
    <text x="40" y="80" fill="#8fc4d4" font-size="10" text-anchor="middle" font-family="Arial">RADAR</text>
  </g>
  <!-- 林地 -->
  <path d="M50 400 Q120 360 200 390 Q260 440 230 500 Q160 540 80 510 Q30 470 50 400" fill="#13241f" stroke="#2a5045" stroke-width="1" opacity="0.7"/>
  <path d="M600 380 Q680 350 740 400 Q780 460 730 510 Q650 530 590 480 Q550 430 600 380" fill="#13241f" stroke="#2a5045" stroke-width="1" opacity="0.7"/>
  <!-- 桥梁 -->
  <line x1="280" y1="200" x2="420" y2="260" stroke="#4a7c8a" stroke-width="6" stroke-dasharray="8,4"/>
  <line x1="300" y1="290" x2="430" y2="280" stroke="#4a7c8a" stroke-width="5" stroke-dasharray="8,4"/>
  <!-- 主干道 -->
  <path d="M20 580 L150 500 L300 420 L500 330 L700 240 L780 180" fill="none" stroke="#3d5c66" stroke-width="5" stroke-dasharray="18,8"/>
  <path d="M680 580 L650 480 L580 360 L520 220 L480 50" fill="none" stroke="#3d5c66" stroke-width="4" stroke-dasharray="12,6"/>
  <!-- 山丘/高地 -->
  <path d="M320 80 Q380 50 440 80 Q480 130 430 170 Q360 180 320 130 Q290 100 320 80" fill="#1a2a30" stroke="#2a4a53" stroke-width="1" opacity="0.6"/>
  <path d="M350 105 L380 90 L410 105 L380 135 Z" fill="none" stroke="#4a7c8a" stroke-width="1" opacity="0.5"/>
  <!-- 标签 -->
  <text x="580" y="210" fill="#7daebf" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold">钻石皇后酒店</text>
  <text x="190" y="110" fill="#7daebf" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold">雷达站</text>
  <text x="150" y="540" fill="#7daebf" font-size="11" text-anchor="middle" font-family="Arial">密林</text>
  <text x="660" y="520" fill="#7daebf" font-size="11" text-anchor="middle" font-family="Arial">密林</text>
  <text x="380" y="70" fill="#7daebf" font-size="11" text-anchor="middle" font-family="Arial">高地</text>
  <text x="720" y="160" fill="#7daebf" font-size="11" text-anchor="middle" font-family="Arial">溪谷北口</text>
  <text x="60" y="580" fill="#7daebf" font-size="11" text-anchor="middle" font-family="Arial">溪谷南口</text>
  <!-- 坐标刻度 -->
  <g fill="#3d5c66" font-size="9" font-family="Arial" opacity="0.7">
    <text x="30" y="40">A1</text><text x="170" y="40">B1</text><text x="310" y="40">C1</text><text x="450" y="40">D1</text><text x="590" y="40">E1</text><text x="730" y="40">F1</text>
    <text x="30" y="140">A2</text><text x="170" y="140">B2</text><text x="310" y="140">C2</text><text x="450" y="140">D2</text><text x="590" y="140">E2</text><text x="730" y="140">F2</text>
    <text x="30" y="240">A3</text><text x="170" y="240">B3</text><text x="310" y="240">C3</text><text x="450" y="240">D3</text><text x="590" y="240">E3</text><text x="730" y="240">F3</text>
    <text x="30" y="340">A4</text><text x="170" y="340">B4</text><text x="310" y="340">C4</text><text x="450" y="340">D4</text><text x="590" y="340">E4</text><text x="730" y="340">F4</text>
    <text x="30" y="440">A5</text><text x="170" y="440">B5</text><text x="310" y="440">C5</text><text x="450" y="440">D5</text><text x="590" y="440">E5</text><text x="730" y="440">F5</text>
    <text x="30" y="540">A6</text><text x="170" y="540">B6</text><text x="310" y="540">C6</text><text x="450" y="540">D6</text><text x="590" y="540">E6</text><text x="730" y="540">F6</text>
  </g>
  <!-- 指北针 -->
  <g transform="translate(720,60)">
    <circle r="22" fill="#0f181d" stroke="#4a7c8a" stroke-width="1.5"/>
    <path d="M0 -16 L4 4 L0 8 L-4 4 Z" fill="#e74c3c"/>
    <path d="M0 16 L4 -4 L0 -8 L-4 -4 Z" fill="#7f8c8d"/>
    <text y="-24" fill="#7f8c8d" font-size="9" text-anchor="middle" font-family="Arial" font-weight="bold">N</text>
  </g>
</svg>
