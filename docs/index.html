<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <title>三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="description" content="三角洲情报台 DeltaIntel — 每日自动更新的战区情报站">
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="manifest.webmanifest?v=20">
  <link rel="apple-touch-icon" href="icon.svg?v=20">
  <link rel="icon" href="icon.svg?v=20">
  <link rel="stylesheet" href="css/style.css?v=20">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://i.y.qq.com" crossorigin>
  <link rel="dns-prefetch" href="https://api.github.com">
</head>
<body>
  <div id="siteAnnounce" class="site-announce"></div>
  <div class="layout">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn menu-toggle" id="menuToggle" title="菜单">☰</button>
        <span class="logo">三角洲<span class="logo-accent">情报台</span></span>
        <span class="brand-en">DeltaIntel</span>
      </div>
      <div class="topbar-right">
        <input id="topSearch" class="top-search" placeholder="搜索…" aria-label="搜索">
        <button class="icon-btn" id="topSearchBtn" title="搜索">🔍</button>
        <a class="nav-link" href="ugc.html" title="用户投稿">📝 投稿</a>
        <a class="nav-link" href="profile.html" title="我的主页">👤 主页</a>
        <button class="icon-btn" id="themeToggle" title="切换明暗">🌓</button>
        <a class="nav-link" id="authBtn" href="forum.html" title="登录 / 注册">🔑 登录/注册</a>
        <a class="nav-link" href="admin.html" title="管理后台">🛡️ 后台</a>
      </div>
    </header>

    <!-- 左侧菜单 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">热点内容一图流</div>
      <nav class="menu" id="menu"><!-- JS 注入 --></nav>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <!-- 内容区 -->
    <main class="content">
      <div id="LAY_preview" class="preview"><!-- 视图片段注入处 --></div>
    </main>

    <!-- 底栏 -->
    <footer class="footer">
      <p>三角洲情报台 · 数据每日自动更新 · <span id="updatedAt">加载中…</span></p>
    </footer>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script defer src="js/app.js?v=20"></script>
  <script defer src="js/art.js?v=20"></script>
  <script defer src="js/crafting.js?v=20"></script>
  <script defer src="js/simulators.js?v=20"></script>
  <script defer src="js/games.js?v=20"></script>
  <script defer src="js/music.js?v=20"></script>
  <script defer src="js/codex.js?v=20"></script>
  <script defer src="js/addons.js?v=20"></script>
  <script defer src="js/guides.js?v=20"></script>
  <script defer src="js/database.js?v=20"></script>
  <script defer src="js/feedback.js?v=20"></script>
  <script defer src="js/analytics.js?v=20"></script>
  <script defer src="js/liveprice.js?v=20"></script>
  <script defer src="js/mappass.js?v=20"></script>
  <script defer src="js/site-common.js?v=20"></script>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("di_user_token");
        var id = localStorage.getItem("di_user_id") || "";
        var txt = document.getElementById("authBtnText");
        var a = document.getElementById("authBtn");
        if (t && id) {
          txt.textContent = id.length > 12 ? id.slice(0, 12) + "…" : id;
          a.title = "进入论坛 / 退出登录";
        }
      } catch (e) {}
    })();
    (function () {
      function go() {
        var q = document.getElementById("topSearch").value.trim();
        if (q) location.href = "search.html?q=" + encodeURIComponent(q);
      }
      var btn = document.getElementById("topSearchBtn");
      if (btn) btn.addEventListener("click", go);
      var inp = document.getElementById("topSearch");
      if (inp) inp.addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });
    })();
  </script>
</body>
</html>
