<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <title>赞助我们 · 三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <style>
    :root{ --bg:#0e1116; --card:#161b22; --border:#262d36; --text:#e6e9ef; --muted:#8b93a1; --accent:#ffb300; }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:24px 16px}
    .wrap{max-width:720px;margin:0 auto}
    a.back{color:var(--muted);text-decoration:none;font-size:14px}
    h1{font-size:24px;margin:18px 0 6px}
    .sub{color:var(--muted);margin:0 0 22px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin:16px 0}
    .card h2{margin:0 0 12px;font-size:18px;color:var(--accent)}
    .btn{display:inline-block;background:var(--accent);color:#1a1a1a;font-weight:700;text-decoration:none;border-radius:10px;padding:12px 22px;font-size:15px}
    .btn:hover{filter:brightness(1.08)}
    .qr{width:200px;height:200px;border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;margin:10px 0}
    .tip{font-size:13px;color:var(--muted);background:rgba(255,179,0,.08);border:1px solid rgba(255,179,0,.25);border-radius:10px;padding:10px 12px;margin-top:12px}
    .pay-photo{display:inline-block;margin:8px 10px 8px 0;vertical-align:top;text-align:center}
    .pay-photo img{width:200px;height:200px;object-fit:cover;border:2px dashed var(--border);border-radius:12px;display:block}
    .pay-label{font-size:12px;color:var(--muted);margin-top:6px}
    footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 返回三角洲情报台</a>
    <h1>💝 赞助三角洲情报台</h1>
    <p class="sub">本站由学生独立维护，零预算运行（GitHub Pages 免费托管，数据每日自动更新）。如果你觉得有用，欢迎请我喝杯奶茶 ☕，你的支持能让站点继续稳定运行下去。</p>

    <div class="card">
      <h2>爱发电（推荐）</h2>
      <p>点击下方按钮，在爱发电平台进行赞助（无需加好友，最省事）。</p>
      <!-- 链接由管理后台「站点配置」里的爱发电链接自动填充；未设置时回退到爱发电首页 -->
      <a class="btn" id="afdianLink" href="https://afdian.com/" target="_blank" rel="noopener">前往爱发电赞助</a>
    </div>

    <div class="card">
      <h2>微信 / 支付宝收款码</h2>
      <p>你也可以扫码直接打赏：</p>
      <div id="payPhotos"></div>
      <p class="tip">⚠️ 收款码通常需实名认证，未成年人可能受限或提现不便。如果无法使用，请直接用上面的「爱发电」链接，不影响支持。</p>
    </div>

    <footer>三角洲情报台 DeltaIntel · 感谢每一位支持者</footer>
  </div>

  <script>
    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
    // 读取站点配置，自动填充爱发电链接与收款照片（管理后台可改）
    fetch("data.json?_=" + Date.now()).then(function (r) { return r.json(); }).then(function (d) {
      var url = d && d.site && d.site.afdianUrl;
      if (url) { document.getElementById("afdianLink").href = url; }
      var photos = (d && d.sponsor && d.sponsor.photos) || [];
      var box = document.getElementById("payPhotos");
      if (!box) return;
      if (photos.length) {
        box.innerHTML = photos.map(function (p) {
          return '<div class="pay-photo"><img src="' + esc(p.src || "") + '" alt="' + esc(p.label || "收款照片") + '"><div class="pay-label">' + esc(p.label || "") + '</div></div>';
        }).join("");
      } else {
        box.innerHTML = '<div class="qr">管理员可在后台「收款照片」面板添加收款码图片</div>';
      }
    }).catch(function () {});
  </script>
</body>
</html>
