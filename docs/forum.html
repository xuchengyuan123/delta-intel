<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8">
  <title>战友论坛 · 三角洲情报台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
  <link rel="stylesheet" href="css/style.css?v=19">
  <style>
    .forum-wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
    .forum-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .forum-head .logo { font-size: 18px; font-weight: 700; }
    .forum-head .logo-accent { color: var(--accent); }
    .forum-head a.back { color: var(--muted); text-decoration: none; font-size: 13px; }
    .forum-head a.back:hover { color: var(--accent); }
    .forum-tip { color: var(--muted); font-size: 13px; margin: 4px 0 14px; }

    /* 登录态 */
    .who-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }
    .who-bar .me { color: var(--accent); font-weight: 600; }

    /* 认证卡片 */
    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tabs .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; cursor: pointer;
      background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 14px; }
    .tabs .tab.active { color: var(--accent); border-color: var(--accent); font-weight: 700; }
    .auth-card input { width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 9px 10px; font-size: 14px; margin-bottom: 8px; box-sizing: border-box; }
    .auth-card .row { display: flex; gap: 8px; }
    .auth-card .row input { margin-bottom: 0; }
    .auth-card .row button { white-space: nowrap; }
    .auth-card .actions { display: flex; gap: 8px; margin-top: 10px; }
    .note { font-size: 12px; color: var(--muted); margin: 6px 0 0; line-height: 1.5; }
    .note code { background: rgba(255,255,255,0.08); padding: 1px 4px; border-radius: 4px; }
    .devcode { margin: 8px 0 0; padding: 8px 10px; background: rgba(255,179,0,0.12);
      border: 1px solid rgba(255,179,0,0.4); border-radius: 8px; font-size: 13px; color: #ffce6b; }
    .devcode b { color: #ffb300; font-size: 15px; letter-spacing: 2px; }

    .err-box { display: none; background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.35); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; color: #ff8e8e; line-height: 1.6; }
    .ok-box { display: none; background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.35); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; color: #7fdc83; }
    .ok-box b { color: #4caf50; }

    .composer { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 16px; }
    .composer input.title, .composer textarea { width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 9px 10px; font-size: 14px; margin-bottom: 8px; box-sizing: border-box; }
    .composer textarea { min-height: 80px; resize: vertical; font-family: inherit; }
    .composer .row { display: flex; justify-content: flex-end; gap: 8px; }
    .login-hint { background: var(--card); border: 1px dashed var(--border); border-radius: 10px; padding: 16px; text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 16px; }
    .login-hint .btn { margin-top: 10px; }

    .post { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
    .post .pmeta { display: flex; gap: 10px; align-items: baseline; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .post .pauthor { color: var(--accent); font-weight: 600; }
    .post .ptitle { font-size: 16px; font-weight: 700; margin: 0 0 6px; cursor: pointer; }
    .post .ptitle:hover { color: var(--accent); }
    .post .psnippet { white-space: pre-wrap; line-height: 1.6; font-size: 14px; color: var(--text); }
    .post .pactions { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
    .detail { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; }
    .detail .pbody { white-space: pre-wrap; line-height: 1.7; font-size: 14px; }
    .replies { margin-top: 10px; }
    .reply { font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .reply .rauthor { color: var(--accent); font-weight: 600; }
    .reply .rbody { white-space: pre-wrap; line-height: 1.5; margin-top: 2px; }
    .reply-box { margin-top: 8px; }
    .reply-box textarea { width: 100%; min-height: 56px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
    .status { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
    .err { color: #ff6b6b; }
    .more-btn { display: block; margin: 8px auto 0; }
  </style>
</head>
<body>
  <div id="siteAnnounce" class="site-announce"></div>
  <div class="forum-wrap">
    <div class="forum-head">
      <span class="logo">三角洲<span class="logo-accent">情报台</span> · 战友论坛</span>
      <a class="back" href="index.html">← 返回首页</a>
    </div>
    <p class="forum-tip">用本站账号登录即可发帖、回复。看帖无需登录。帖子由 <code>api.delta.shopping</code> 后端存储，全站（含大陆）可访问。</p>

    <div id="msgBox" class="err-box"></div>

    <!-- 已登录 -->
    <div class="who-bar" id="whoBar" style="display:none">
      <span class="me" id="whoMe"></span>
      <button class="btn ghost sm" id="logoutBtn">退出登录</button>
    </div>

    <!-- 未登录：认证卡片 -->
    <div class="auth-card" id="authCard">
      <div class="tabs">
        <div class="tab active" id="tabLogin">登录</div>
        <div class="tab" id="tabReg">注册</div>
      </div>

      <div class="oauth-box">
        <button class="btn qq-btn" id="qqLoginBtn" type="button" style="background:#12b7f5;color:#fff;border:none;display:none;">🔵 使用 QQ 登录</button>
        <p class="note" style="display:none">QQ 登录需在 <a href="https://connect.qq.com" target="_blank" rel="noopener">QQ 互联</a> 实名注册应用并配置后端后开放（当前暂未开通）。</p>
      </div>
      <div class="divider" style="text-align:center;color:var(--muted);margin:14px 0;font-size:12px;position:relative;"><span style="background:var(--bg);padding:0 10px;">使用本站账号</span></div>

      <!-- 登录表单 -->
      <div id="loginForm">
        <input id="loginId" placeholder="邮箱或手机号" />
        <div class="row">
          <input id="loginPw" type="password" placeholder="密码" />
          <button class="btn ghost sm" id="loginSend">发验证码</button>
        </div>
        <input id="loginCode" placeholder="验证码（留空则用密码登录）" />
        <div class="devcode" id="loginDevCode" style="display:none"></div>
        <div class="actions">
          <button class="btn" id="loginBtn">登录</button>
        </div>
        <p class="note">没有账号？点上方「注册」先用邮箱 + 验证码注册（手机号验证码暂未开放）。忘记密码可重新注册（同一账号会被覆盖）。</p>
      </div>

      <!-- 注册表单 -->
      <div id="regForm" style="display:none">
        <input id="regId" placeholder="邮箱或手机号" />
        <div class="row">
          <input id="regCode" placeholder="验证码" />
          <button class="btn ghost sm" id="regSend">发送验证码</button>
        </div>
        <input id="regPw" type="password" placeholder="设置密码（至少 6 位）" />
        <div class="actions">
          <button class="btn" id="regBtn">注册并登录</button>
        </div>
        <p class="note">注册会向该邮箱发送验证码（若发送失败，验证码会显示在下方）。</p>
        <div class="devcode" id="regDevCode" style="display:none"></div>
      </div>
    </div>

    <!-- 发帖 -->
    <div id="composerWrap">
      <div class="composer" id="composer">
        <input class="title" id="postTitle" placeholder="帖子标题" />
        <textarea id="postBody" placeholder="说点什么…（支持换行）"></textarea>
        <div class="row">
          <button class="btn" id="postBtn">发帖</button>
        </div>
      </div>
      <div class="login-hint" id="loginHint" style="display:none">
        登录后即可发帖、回复。
        <br><button class="btn" id="gotoLogin">去登录</button>
      </div>
    </div>

    <div id="posts"><div class="status">加载中…</div></div>
    <button class="btn ghost more-btn" id="moreBtn" style="display:none">加载更多</button>
  </div>

  <script defer src="js/site-common.js?v=19"></script>
  <script>
    var API = "https://api.delta.shopping";
    var KT = "di_user_token", KID = "di_user_id", KR = "di_user_role";

    function getToken() { try { return localStorage.getItem(KT) || ""; } catch (e) { return ""; } }
    function setToken(t) { try { localStorage.setItem(KT, t); } catch (e) {} }
    function getId() { try { return localStorage.getItem(KID) || ""; } catch (e) { return ""; } }
    function setId(v) { try { localStorage.setItem(KID, v); } catch (e) {} }
    function getRole() { try { return localStorage.getItem(KR) || ""; } catch (e) { return ""; } }
    function setRole(v) { try { localStorage.setItem(KR, v); } catch (e) {} }
    function clearAuth() { try { localStorage.removeItem(KT); localStorage.removeItem(KID); localStorage.removeItem(KR); } catch (e) {} }

    function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
    function fmt(ts) {
      try { var d = new Date(ts); if (isNaN(d)) return "";
        return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0") + " " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0"); }
      catch (e) { return ""; }
    }

    function setMsg(html, ok) {
      var box = document.getElementById("msgBox");
      if (!html) { box.style.display = "none"; box.className = "err-box"; return; }
      box.innerHTML = html; box.className = ok ? "ok-box" : "err-box"; box.style.display = "block";
    }
    function showError(msg) { var p = document.getElementById("posts"); p.innerHTML = '<div class="status err">' + esc(msg) + "</div>"; }

    function api(path, opts) {
      opts = opts || {};
      opts.headers = opts.headers || {};
      opts.headers["Content-Type"] = "application/json";
      var t = getToken();
      if (t) opts.headers["Authorization"] = "Bearer " + t;
      return fetch(API + path, opts).then(function (r) {
        return r.json().catch(function () { return { error: "服务器返回异常" }; }).then(function (j) {
          if (!r.ok) throw new Error(j.error || ("HTTP " + r.status));
          return j;
        });
      });
    }

    /* ===== 登录态渲染 ===== */
    function renderAuth() {
      var t = getToken(), id = getId(), role = getRole();
      var logged = !!t;
      document.getElementById("whoBar").style.display = logged ? "flex" : "none";
      document.getElementById("authCard").style.display = logged ? "none" : "block";
      document.getElementById("composer").style.display = logged ? "block" : "none";
      document.getElementById("loginHint").style.display = logged ? "none" : "block";
      if (logged) {
        var rlabel = role === "super" ? "总管理员" : role === "tasks" ? "分管理员" : "用户";
        document.getElementById("whoMe").textContent = "你好，" + id + "（" + rlabel + "）";
      }
    }

    /* ===== 论坛帖子 ===== */
    var state = { posts: [], offset: 0, limit: 20, openId: null };

    function renderList() {
      var box = document.getElementById("posts");
      if (!state.posts.length) { box.innerHTML = '<div class="status">还没有帖子，发第一帖吧！</div>'; document.getElementById("moreBtn").style.display = "none"; return; }
      var html = "";
      state.posts.forEach(function (it) {
        html += '<div class="post" data-id="' + esc(it.id) + '">' +
          '<div class="pmeta"><span class="pauthor">' + esc(it.author) + "</span><span>" + fmt(it.createdAt) + "</span><span>💬 " + (it.replyCount || 0) + "</span></div>" +
          '<div class="ptitle" data-id="' + esc(it.id) + '">' + esc(it.title) + "</div>" +
          '<div class="psnippet">' + esc(it.snippet || "") + "</div>" +
          '<div class="pactions"><button class="btn ghost sm act-toggle" data-id="' + esc(it.id) + '">查看 / 回复</button></div>' +
          '<div class="detail" id="detail-' + esc(it.id) + '" style="display:none"></div>' +
          "</div>";
      });
      box.innerHTML = html;
      document.getElementById("moreBtn").style.display = (state.posts.length >= state.offset + state.limit) ? "block" : "none";
      bindPosts();
    }

    function bindPosts() {
      document.querySelectorAll(".ptitle, .act-toggle").forEach(function (el) {
        el.addEventListener("click", function () {
          var id = el.getAttribute("data-id");
          var det = document.getElementById("detail-" + id);
          if (det.style.display === "none") { openPost(id); } else { det.style.display = "none"; det.innerHTML = ""; }
        });
      });
    }

    function openPost(id) {
      var det = document.getElementById("detail-" + id);
      det.innerHTML = '<div class="status">加载中…</div>'; det.style.display = "block";
      api("/api/forum/posts/" + encodeURIComponent(id), { method: "GET" }).then(function (j) {
        var p = j.post;
        if (!p) { det.innerHTML = '<div class="status err">帖子不存在或已删除</div>'; return; }
        var me = getId(), role = getRole();
        var canDelete = (p.author === me) || role === "super" || role === "tasks";
        var html = '<div class="pbody">' + esc(p.body) + "</div>";
        html += '<div class="replies" id="replies-' + esc(id) + '"><div class="status">加载回复…</div></div>';
        if (canDelete) html += '<div style="margin-top:8px"><button class="btn ghost sm act-del" data-id="' + esc(id) + '">删除本帖</button></div>';
        if (getToken()) html += '<div class="reply-box"><textarea id="rb-' + esc(id) + '" placeholder="回复内容…"></textarea><div style="margin-top:6px;text-align:right"><button class="btn sm do-reply" data-id="' + esc(id) + '">发送回复</button></div></div>';
        det.innerHTML = html;
        loadReplies(id);
        var del = det.querySelector(".act-del");
        if (del) del.addEventListener("click", function () { deletePost(id); });
        var rb = det.querySelector(".do-reply");
        if (rb) rb.addEventListener("click", function () {
          var txt = document.getElementById("rb-" + id).value.trim();
          if (!txt) { setMsg("回复内容不能为空"); return; }
          api("/api/forum/posts/" + encodeURIComponent(id) + "/reply", { method: "POST", body: JSON.stringify({ body: txt }) })
            .then(function () { document.getElementById("rb-" + id).value = ""; setMsg("回复成功。", true); loadReplies(id); bumpReplyCount(id); })
            .catch(function (e) { setMsg(e.message || "回复失败"); });
        });
      }).catch(function (e) { det.innerHTML = '<div class="status err">' + esc(e.message || "加载失败") + "</div>"; });
    }

    function loadReplies(id) {
      var box = document.getElementById("replies-" + id);
      if (!box) return;
      api("/api/forum/posts/" + encodeURIComponent(id), { method: "GET" }).then(function (j) {
        var list = (j.post && j.post.replies) || [];
        if (!list.length) { box.innerHTML = '<div class="reply" style="color:var(--muted)">还没有回复，来抢沙发～</div>'; return; }
        var html = "";
        list.forEach(function (c) {
          html += '<div class="reply"><span class="rauthor">' + esc(c.author) + "</span> · " + fmt(c.createdAt) +
            '<div class="rbody">' + esc(c.body) + "</div></div>";
        });
        box.innerHTML = html;
      }).catch(function () {});
    }

    function bumpReplyCount(id) {
      var it = state.posts.find(function (x) { return x.id === id; });
      if (it) { it.replyCount = (it.replyCount || 0) + 1; renderList(); openPost(id); }
    }

    function deletePost(id) {
      if (!confirm("确定删除这篇帖子？")) return;
      api("/api/forum/posts/" + encodeURIComponent(id), { method: "DELETE" }).then(function () {
        setMsg("帖子已删除。", true);
        state.posts = state.posts.filter(function (x) { return x.id !== id; });
        renderList();
      }).catch(function (e) { setMsg(e.message || "删除失败"); });
    }

    function loadPosts(reset) {
      if (reset) { state.offset = 0; state.posts = []; }
      document.getElementById("posts").innerHTML = '<div class="status">加载中…</div>';
      api("/api/forum/posts?limit=" + state.limit + "&offset=" + state.offset, { method: "GET" })
        .then(function (j) {
          var list = j.posts || [];
          state.posts = state.posts.concat(list);
          state.offset += list.length;
          renderList();
        })
        .catch(function (e) { showError(e.message || "加载失败"); });
    }

    /* ===== 认证交互 ===== */
    function switchTab(which) {
      var isLogin = which === "login";
      document.getElementById("tabLogin").classList.toggle("active", isLogin);
      document.getElementById("tabReg").classList.toggle("active", !isLogin);
      document.getElementById("loginForm").style.display = isLogin ? "block" : "none";
      document.getElementById("regForm").style.display = isLogin ? "none" : "block";
    }
    document.getElementById("tabLogin").addEventListener("click", function(){ switchTab("login"); });
    document.getElementById("tabReg").addEventListener("click", function(){ switchTab("reg"); });
    document.getElementById("gotoLogin").addEventListener("click", function(){
      document.getElementById("authCard").scrollIntoView({behavior:"smooth"});
      switchTab("login");
    });

    document.getElementById("loginSend").addEventListener("click", function () {
      var id = document.getElementById("loginId").value.trim();
      if (!id) { setMsg("请先填邮箱或手机号"); return; }
      setMsg("正在发送验证码…", true);
      api("/api/user/send-code", { method: "POST", body: JSON.stringify({ to: id, purpose: "login" }) })
        .then(function (j) {
          if (j.devCode) {
            var dc = document.getElementById("loginDevCode");
            dc.style.display = "block";
            dc.innerHTML = "你的验证码：<b>" + esc(j.devCode) + "</b>（已显示在下方，直接填到上面的验证码框即可）";
          }
          setMsg(j.devCode ? "验证码已显示在下方 ↓" : "验证码已发送，请查收邮箱。", true);
        })
        .catch(function (e) { setMsg(e.message || "发送失败"); });
    });

    document.getElementById("loginBtn").addEventListener("click", function () {
      var id = document.getElementById("loginId").value.trim();
      var pw = document.getElementById("loginPw").value;
      var code = document.getElementById("loginCode").value.trim();
      if (!id) { setMsg("请填邮箱或手机号"); return; }
      if (!pw && !code) { setMsg("请填密码或验证码"); return; }
      setMsg("登录中…", true);
      var body = { id: id };
      if (code) body.code = code; else body.password = pw;
      api("/api/user/login", { method: "POST", body: JSON.stringify(body) })
        .then(function (j) { setToken(j.session); setId(j.id); setRole(j.role); renderAuth(); setMsg("登录成功，欢迎回来！", true); loadPosts(true); })
        .catch(function (e) { setMsg(e.message || "登录失败"); });
    });

    document.getElementById("regSend").addEventListener("click", function () {
      var id = document.getElementById("regId").value.trim();
      if (!id) { setMsg("请先填邮箱或手机号"); return; }
      setMsg("正在发送验证码…", true);
      api("/api/user/send-code", { method: "POST", body: JSON.stringify({ to: id, purpose: "register" }) })
        .then(function (j) {
          if (j.devCode) {
            var dc = document.getElementById("regDevCode");
            dc.style.display = "block";
            dc.innerHTML = "测试验证码：<b>" + esc(j.devCode) + "</b>（开发模式回显；正式上线后改为邮件/短信发送）";
          }
          setMsg("验证码已发送。", true);
        })
        .catch(function (e) { setMsg(e.message || "发送失败"); });
    });

    document.getElementById("regBtn").addEventListener("click", function () {
      var id = document.getElementById("regId").value.trim();
      var code = document.getElementById("regCode").value.trim();
      var pw = document.getElementById("regPw").value;
      if (!id || !code || !pw) { setMsg("账号、验证码、密码都要填"); return; }
      setMsg("注册中…", true);
      api("/api/user/register", { method: "POST", body: JSON.stringify({ id: id, code: code, password: pw }) })
        .then(function (j) { setToken(j.session); setId(j.id); setRole(j.role); renderAuth(); setMsg("注册成功，已自动登录！", true); loadPosts(true); })
        .catch(function (e) { setMsg(e.message || "注册失败"); });
    });

    document.getElementById("logoutBtn").addEventListener("click", function () {
      api("/api/logout", { method: "POST" }).catch(function(){});
      clearAuth(); renderAuth(); setMsg("已退出登录。", true);
    });

    document.getElementById("postBtn").addEventListener("click", function () {
      var title = document.getElementById("postTitle").value.trim();
      var body = document.getElementById("postBody").value.trim();
      if (!title || !body) { setMsg("标题和内容都要填"); return; }
      setMsg("发帖中…", true);
      api("/api/forum/posts", { method: "POST", body: JSON.stringify({ title: title, body: body }) })
        .then(function (j) {
          document.getElementById("postTitle").value = "";
          document.getElementById("postBody").value = "";
          setMsg("发帖成功！", true);
          loadPosts(true);
        })
        .catch(function (e) { setMsg(e.message || "发帖失败"); });
    });

    document.getElementById("moreBtn").addEventListener("click", function () { loadPosts(false); });

    /* ===== QQ 登录（OAuth 回调接收） ===== */
    (function handleQQCallback() {
      try {
        var q = new URLSearchParams(location.search);
        var tk = q.get("token"), uid = q.get("id"), ur = q.get("role"), qe = q.get("qq_error");
        if (tk) {
          setToken(tk);
          if (uid) setId(uid);
          if (ur) setRole(ur);
          history.replaceState(null, "", location.pathname);
          renderAuth();
          loadPosts(true);
        }
        if (qe) {
          var msg = qe === "not_configured"
            ? "QQ 登录暂未开通：后端尚未配置 QQ 互联 AppID / AppKey（需在 connect.qq.com 实名注册应用）。"
            : ("QQ 登录失败：" + qe);
          setMsg(msg, false);
        }
      } catch (e) {}
    })();

    document.getElementById("qqLoginBtn").addEventListener("click", function () {
      try {
        var redir = location.origin + "/forum.html";
        location.href = API + "/api/auth/qq?redirect=" + encodeURIComponent(redir);
      } catch (e) { setMsg("跳转 QQ 登录失败"); }
    });

    /* ===== 启动 ===== */
    renderAuth();
    loadPosts(true);

    /* 搜索跳转：#post-<id> 自动展开对应帖子 */
    (function handleHash() {
      var h = location.hash || "";
      var m = h.match(/^#post-(.+)$/);
      if (!m) return;
      var target = m[1];
      var tries = 0;
      var timer = setInterval(function () {
        tries++;
        var found = state.posts.find(function (x) { return x.id === target; });
        if (found) { clearInterval(timer); openPost(target); }
        else if (tries > 10) { clearInterval(timer); }
      }, 400);
    })();
  </script>
</body>
</html>
