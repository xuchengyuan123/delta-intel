<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1a2332" stroke-width="0.5"/>
    </pattern>
    <pattern id="rough" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="1" fill="#1e2838" opacity="0.6"/>
      <circle cx="70" cy="80" r="1.5" fill="#1e2838" opacity="0.5"/>
      <circle cx="50" cy="20" r="1" fill="#1e2838" opacity="0.4"/>
      <circle cx="80" cy="50" r="1.2" fill="#1e2838" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- 战术背景 -->
  <rect width="800" height="600" fill="#0f141d"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#rough)"/>
  <!-- 边界 -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#2c3e50" stroke-width="2" stroke-dasharray="10,6"/>
  <!-- 河流 -->
  <path d="M0 480 Q150 460 250 420 T450 350 T650 300 T800 280" fill="none" stroke="#2a4d6e" stroke-width="18" opacity="0.6"/>
  <path d="M0 480 Q150 460 250 420 T450 350 T650 300 T800 280" fill="none" stroke="#3a6a99" stroke-width="6" opacity="0.4"/>
  <!-- 大坝主体 -->
  <path d="M60 350 L180 320 L300 330 L320 380 L200 420 L80 400 Z" fill="#1e2736" stroke="#4a5c6f" stroke-width="2"/>
  <rect x="130" y="330" width="80" height="50" fill="#16202d" stroke="#4a5c6f" stroke-width="1.5"/>
  <text x="170" y="360" fill="#6e8cad" font-size="10" text-anchor="middle" font-family="Arial">DAM</text>
  <!-- 行政区建筑群 -->
  <rect x="360" y="180" width="140" height="110" fill="#1a2332" stroke="#4a5c6f" stroke-width="1.5"/>
  <rect x="370" y="190" width="45" height="35" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
  <rect x="425" y="190" width="55" height="35" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
  <rect x="370" y="235" width="55" height="45" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
  <rect x="435" y="235" width="45" height="45" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
  <text x="430" y="235" fill="#8aa4c7" font-size="11" text-anchor="middle" font-family="Arial">ADMIN</text>
  <!-- 水泥厂 -->
  <g transform="translate(520,360)">
    <rect x="0" y="0" width="120" height="80" fill="#1a2332" stroke="#4a5c6f" stroke-width="1.5"/>
    <rect x="10" y="10" width="35" height="25" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
    <rect x="55" y="10" width="55" height="25" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
    <rect x="10" y="45" width="45" height="25" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
    <rect x="65" y="45" width="45" height="25" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
    <text x="60" y="72" fill="#8aa4c7" font-size="10" text-anchor="middle" font-family="Arial">CEMENT</text>
  </g>
  <!-- 游客中心 -->
  <rect x="620" y="120" width="90" height="70" fill="#1a2332" stroke="#4a5c6f" stroke-width="1.5"/>
  <rect x="630" y="130" width="70" height="50" fill="#141c27" stroke="#4a5c6f" stroke-width="1"/>
  <text x="665" y="162" fill="#8aa4c7" font-size="10" text-anchor="middle" font-family="Arial">VISITOR</text>
  <!-- 公路/主干道 -->
  <path d="M20 550 L180 480 L300 450 L430 390 L650 280 L780 220" fill="none" stroke="#3d4e60" stroke-width="6" stroke-dasharray="20,8"/>
  <path d="M250 580 L280 430 L360 280 L430 180 L500 50" fill="none" stroke="#3d4e60" stroke-width="4" stroke-dasharray="12,6"/>
  <path d="M520 580 L520 450 L540 360" fill="none" stroke="#3d4e60" stroke-width="4" stroke-dasharray="12,6"/>
  <!-- 撤离点码头 -->
  <rect x="100" y="520" width="80" height="40" fill="#1a2a38" stroke="#4a5c6f" stroke-width="1.5"/>
  <text x="140" y="545" fill="#7a9abc" font-size="9" text-anchor="middle" font-family="Arial">DOCK</text>
  <!-- 林区/高地 -->
  <path d="M600 450 Q650 430 700 460 Q740 500 720 550 Q660 580 600 560 Q560 520 600 450" fill="#14201d" stroke="#2a4a40" stroke-width="1" opacity="0.7"/>
  <path d="M50 120 Q120 90 180 130 Q200 180 150 210 Q80 200 50 120" fill="#14201d" stroke="#2a4a40" stroke-width="1" opacity="0.7"/>
  <!-- 标签 -->
  <text x="430" y="170" fill="#6e8cad" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold">行政辖区</text>
  <text x="580" y="360" fill="#6e8cad" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold">水泥厂</text>
  <text x="665" y="110" fill="#6e8cad" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold">游客中心</text>
  <text x="170" y="310" fill="#6e8cad" font-size="12" text-anchor="middle" font-family="Arial" font-weight="bold">零号大坝</text>
  <text x="140" y="510" fill="#6e8cad" font-size="11" text-anchor="middle" font-family="Arial">撤离码头</text>
  <!-- 坐标刻度 -->
  <g fill="#3d4e60" font-size="9" font-family="Arial" opacity="0.7">
    <text x="30" y="40">A1</text><text x="170" y="40">B1</text><text x="310" y="40">C1</text><text x="450" y="40">D1</text><text x="590" y="40">E1</text><text x="730" y="40">F1</text>
    <text x="30" y="140">A2</text><text x="170" y="140">B2</text><text x="310" y="140">C2</text><text x="450" y="140">D2</text><text x="590" y="140">E2</text><text x="730" y="140">F2</text>
    <text x="30" y="240">A3</text><text x="170" y="240">B3</text><text x="310" y="240">C3</text><text x="450" y="240">D3</text><text x="590" y="240">E3</text><text x="730" y="240">F3</text>
    <text x="30" y="340">A4</text><text x="170" y="340">B4</text><text x="310" y="340">C4</text><text x="450" y="340">D4</text><text x="590" y="340">E4</text><text x="730" y="340">F4</text>
    <text x="30" y="440">A5</text><text x="170" y="440">B5</text><text x="310" y="440">C5</text><text x="450" y="440">D5</text><text x="590" y="440">E5</text><text x="730" y="440">F5</text>
    <text x="30" y="540">A6</text><text x="170" y="540">B6</text><text x="310" y="540">C6</text><text x="450" y="540">D6</text><text x="590" y="540">E6</text><text x="730" y="540">F6</text>
  </g>
  <!-- 指北针 -->
  <g transform="translate(720,60)">
    <circle r="22" fill="#0f141d" stroke="#4a5c6f" stroke-width="1.5"/>
    <path d="M0 -16 L4 4 L0 8 L-4 4 Z" fill="#e74c3c"/>
    <path d="M0 16 L4 -4 L0 -8 L-4 -4 Z" fill="#7f8c8d"/>
    <text y="-24" fill="#7f8c8d" font-size="9" text-anchor="middle" font-family="Arial" font-weight="bold">N</text>
  </g>
</svg>
